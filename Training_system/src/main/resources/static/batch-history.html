<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}
.h1, .h2, .h3, .h4, .h5, .h6, h1, h2, h3, h4, h5, h6 {
    margin-top: 0;
    margin-bottom: .5rem;
    font-weight: 500;
    line-height: 1.2;
    color: white;
}
/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

@keyframes fadeDown{
  from{opacity:0; transform:translateY(-15px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== CARDS ===== */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  transition:0.3s;
  animation:fadeUp 0.5s ease;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 30px rgba(123,44,255,0.2);
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* ===== FILTER AREA ===== */
.filter-group{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
}

label{
  color:var(--muted);
  font-size:14px;
}

/* ===== SELECT ===== */
select{
  background:#101022;
  color:#fff;
  border:1px solid var(--border);
  border-radius:10px;
  padding:8px 12px;
  transition:0.3s;
}

select:focus{
  border-color:var(--purple);
  box-shadow:0 0 10px var(--purple-glow);
  outline:none;
}

/* ===== BUTTON ===== */
.btn-primary{
  background:linear-gradient(135deg,#7b2cff,#a855f7);
  border:none;
  border-radius:25px;
  padding:8px 18px;
  transition:0.3s;
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(123,44,255,0.3);
}

/* ===== TABLE ===== */
.clean-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 10px;
  color:var(--text);
}

/* HEADER */
.clean-table thead th{
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  padding:12px;
  border:none;
}

/* ROW STYLE */
.clean-table tbody tr{
  background:var(--card-soft);
  transition:0.3s;
}

/* CELL */
.clean-table td{
  padding:14px;
  border:none;
}

/* rounded row */
.clean-table tr td:first-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}
.clean-table tr td:last-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

/* hover effect */
.clean-table tbody tr:hover{
  transform:translateY(-4px);
  background:linear-gradient(135deg,#1e1e38,#17172a);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* ===== PROGRESS BAR ===== */
.progress{
  height:8px;
  border-radius:10px;
  background:#1a1a2e;
  overflow:hidden;
}

.progress-bar{
  background:linear-gradient(135deg,#7b2cff,#a855f7);
}

/* ===== RESPONSIVE ===== */
@media(max-width:992px){
  .sidebar{
    transform:translateX(-100%);
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .main{
    margin-left:0;
  }
}

/* TABLE → CARD (MOBILE) */
@media(max-width:768px){

  .clean-table thead{
    display:none;
  }

  .clean-table,
  .clean-table tbody,
  .clean-table tr,
  .clean-table td{
    display:block;
    width:100%;
  }

  .clean-table tr{
    margin-bottom:15px;
    background:var(--card);
    padding:12px;
    border-radius:12px;
  }

  .clean-table td{
    text-align:left;
    padding:8px;
  }

  .clean-table td::before{
    content:attr(data-label);
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }

  .filter-group{
    flex-direction:column;
    align-items:flex-start;
  }

  select, .btn-primary{
    width:100%;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Smart Admin</div>

<a href="admin_dashboard.html">
        <i class="fas fa-home me-2"></i> Dashboard
    </a>

    <a href="add_trainer.html">
        <i class="fas fa-user-plus me-2"></i> Add Trainers
    </a>

    <a href="trainer.html">
        <i class="fas fa-users me-2"></i> Trainers
    </a>

    <a href="assign-batch.html">
        <i class="fas fa-box me-2"></i> Batches
    </a>

    <a href="batch-history.html" class="active">
        <i class="fas fa-history me-2"></i> History
    </a>

    <a href="admin_progress.html">
        <i class="fas fa-chart-line me-2"></i> Progress
    </a>

    <a href="admin_notification.html">
        <i class="fas fa-bell me-2"></i> Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
  <h5 class="mb-0">Batch History</h5>
</div>

<!-- FILTER CARD -->
<div class="card mb-4">
  <h5>Filter Batches</h5>

  <div class="filter-group mt-3">
    <label>Year:</label>
    <select id="year">
      <option value="2025">2025</option>
      <option value="2026">2026</option>
    </select>

    <label>Month:</label>
    <select id="month">
      <option value="">All</option>
      <option value="1">Jan</option>
      <option value="2">Feb</option>
      <option value="3">Mar</option>
      <option value="4">Apr</option>
      <option value="5">May</option>
      <option value="6">Jun</option>
      <option value="7">Jul</option>
      <option value="8">Aug</option>
      <option value="9">Sep</option>
      <option value="10">Oct</option>
      <option value="11">Nov</option>
      <option value="12">Dec</option>
    </select>

    <button onclick="loadHistory()" class="btn btn-primary">
      <i class="fas fa-search"></i> Load
    </button>
  </div>
</div>

<!-- TABLE CARD -->
<div class="card">
  <h5>Completed Batches</h5>

  <table class="table clean-table text-center align-middle">
    <thead>
      <tr>
        <th>Batch</th>
        <th>Trainer</th>
        <th>Start</th>
        <th>End</th>
        <th>Progress</th>
      </tr>
    </thead>

    <tbody id="tableBody1"></tbody>
  </table>
</div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
