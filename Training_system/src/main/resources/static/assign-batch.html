<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}
label {
    display: inline-block;
    color:white;
}

/* ================= CARD ================= */
.card{
  background: var(--card-bg);
  border:1px solid var(--border);
  border-radius:16px;
  padding:25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  transition:0.3s;
  animation: fadeUp 0.6s ease;
}

.card:hover{
  transform: translateY(-6px);
  box-shadow: 0 15px 35px rgba(138,43,226,0.3);
}

/* ================= HEADINGS ================= */
h5{
  font-weight:600;
  color:#ffffff;
}

/* ================= INPUT ================= */
.form-control, select{
  background:#141424 !important;
  border:1px solid var(--border) !important;
  color:#fff !important;
  border-radius:10px;
  padding:10px;
  transition:0.3s;
}

.form-control:focus, select:focus{
  border-color: var(--primary) !important;
  box-shadow: 0 0 10px rgba(138,43,226,0.4) !important;
}

/* ================= DATE ICON ================= */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(1);
  cursor:pointer;
}

/* ================= DROPDOWN ICON ================= */
#trainerDropdown{
  appearance:none;
  padding-right:35px;
  background-image:url("data:image/svg+xml;utf8,<svg fill='white' viewBox='0 0 20 20'><path d='M5 7l5 5 5-5H5z'/></svg>");
  background-repeat:no-repeat;
  background-position:right 10px center;
}

/* ================= BUTTON ================= */
.btn-primary{
  background: linear-gradient(135deg,#7b2cff,#a855f7);
  border:none;
  border-radius:12px;
  padding:12px;
  transition:0.3s;
}

.btn-primary:hover{
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(138,43,226,0.4);
}

/* ================= DARK TABLE ================= */
.table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 10px;
  color: #fff;
}

/* HEADER */
.table thead {
  background: transparent;
}

.table thead th {
  color: #a855f7;
  font-weight: 600;
  border: none;
  padding: 12px;
  text-transform: uppercase;
  font-size: 13px;
  letter-spacing: 0.5px;
}

/* ROW STYLE */
.table tbody tr {
  background: #141424;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

/* CELL */
.table tbody td {
  padding: 14px;
  border: none;
}

/* ROUNDED ROW EFFECT */
.table tbody tr td:first-child {
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}

.table tbody tr td:last-child {
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

/* HOVER EFFECT */
.table tbody tr:hover {
  transform: scale(1.01);
  background: rgba(168, 85, 247, 0.15);
  box-shadow: 0 10px 25px rgba(168,85,247,0.25);
}

/* STATUS BADGES */
.status {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

.status.UPCOMING {
  background: rgba(59,130,246,0.2);
  color: #60a5fa;
}

.status.ONGOING {
  background: rgba(168,85,247,0.2);
  color: #c084fc;
}

.status.COMPLETED {
  background: rgba(34,197,94,0.2);
  color: #4ade80;
}

/* ACTION BUTTONS */
.table .btn {
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 13px;
  transition: 0.3s;
}

.table .btn-warning {
  background: #f59e0b;
  border: none;
}

.table .btn-danger {
  background: #ef4444;
  border: none;
}

.table .btn:hover {
  transform: scale(1.1);
}
/* ================= MODAL ================= */
.modal-content{
  background:#141424;
  border-radius:15px;
  border:1px solid var(--border);
  color:#fff;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes slideDown{
  from{
    opacity:0;
    transform:translateY(-20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){

  .sidebar{
    width:200px;
  }

  .main{
    margin-left:0;
    padding:15px;
  }

  .card{
    padding:18px;
  }

  .topbar{
    padding:15px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Smart Admin</div>

  <a href="admin_dashboard.html">
        <i class="fas fa-home me-2"></i> Dashboard
    </a>

    <a href="add_trainer.html">
        <i class="fas fa-user-plus me-2"></i> Add Trainers
    </a>

    <a href="trainer.html">
        <i class="fas fa-users me-2"></i> Trainers
    </a>

    <a href="assign-batch.html" class="active">
        <i class="fas fa-box me-2"></i> Batches
    </a>

    <a href="batch-history.html">
        <i class="fas fa-history me-2"></i> History
    </a>

    <a href="#">
        <i class="fas fa-chart-line me-2"></i> Progress
    </a>

    <a href="notification.html">
        <i class="fas fa-bell me-2"></i> Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
  <h5 class="mb-0">Batch Management</h5>
</div>

<!-- CREATE CARD -->
<div class="card mb-4">
  <h5>Create Batch</h5>

  <div class="row g-3 mt-2">

    <div class="col-md-4">
      <label>Batch Name</label>
      <input id="batchName" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Start Date</label>
      <input type="date" id="startDate" class="form-control">
    </div>

    <div class="col-md-4">
      <label>End Date</label>
      <input type="date" id="endDate" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Total Days</label>
      <input type="number" id="totalDays" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Trainer</label>
      <div class="position-relative">
  <select id="trainerDropdown" class="form-control"></select>
  <i class="fas fa-chevron-down dropdown-icon"></i>
</div>
    </div>

  </div>

  <button onclick="createBatch()" class="btn btn-primary mt-3">
    <i class="fas fa-plus"></i> Create Batch
  </button>
</div>

<!-- TABLE -->
<div class="card">
  <h5>All Batches</h5>

  <table class="table clean-table text-center align-middle">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Trainer</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="batchTable"></tbody>
  </table>

  <div id="batchPagination" class="mt-3 text-center"></div>
</div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editBatchModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Edit Batch</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editBatchId">

        <input class="form-control mb-2" id="editBatchName" placeholder="Batch Name">
        <input class="form-control mb-2" type="date" id="editStartDate">
        <input class="form-control mb-2" type="date" id="editEndDate">

        <select class="form-control mb-2" id="editStatus">
          <option>UPCOMING</option>
          <option>ONGOING</option>
          <option>COMPLETED</option>
        </select>

        <select id="editTrainerDropdown" class="form-control"></select>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="updateBatch()">Update</button>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
