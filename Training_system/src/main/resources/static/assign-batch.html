body{

/* =========================
   TOPBAR ANIMATION (PRO STYLE)
========================= */

.topbar{
  position: sticky;
  top: 0;
  z-index: 1000;

  background: rgba(20,20,36,0.6);
  backdrop-filter: blur(12px);

  border: 1px solid rgba(123,44,255,0.15);
  border-radius: 14px;

  box-shadow: 0 0 25px rgba(123,44,255,0.15);

  /* entry animation */
  animation: topbarSlide 0.6s ease forwards;

  transition: all 0.3s ease;
}

/* slide + fade in */
@keyframes topbarSlide{
  from{
    opacity: 0;
    transform: translateY(-20px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* hover glow effect */
.topbar:hover{
  box-shadow: 0 0 35px rgba(123,44,255,0.35);
  transform: translateY(-2px);
}

/* subtle floating effect */
@keyframes floatGlow{
  0%{ box-shadow: 0 0 20px rgba(123,44,255,0.15); }
  50%{ box-shadow: 0 0 30px rgba(123,44,255,0.25); }
  100%{ box-shadow: 0 0 20px rgba(123,44,255,0.15); }
}

/* optional continuous glow (uncomment if you want) */
/*
.topbar{
  animation: topbarSlide 0.6s ease forwards, floatGlow 4s infinite ease-in-out;
}
*/
/* =========================
   CARDS (PRO UI STYLE)
========================= */

.card{
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

.card:hover{
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(123,44,255,0.2);
}

/* =========================
   HEADINGS
========================= */

h5{
  color:#ffffff;
  font-weight:600;
  margin-bottom: 15px;
}

/* =========================
   LABELS
========================= */

label{
  font-size: 13px;
  color:#cfcfe6;
  margin-bottom:6px;
  display:block;
}

/* =========================
   INPUT FIELDS (VERY CLEAN)
========================= */

.form-control,
select{
  background: #141424 !important;
  border: 1px solid rgba(255,255,255,0.08) !important;
  color: #fff !important;
  border-radius: 10px;
  padding: 10px 12px;
  transition: 0.25s ease;
  box-shadow: none !important;
}

/* placeholder */
.form-control::placeholder{
  color:#8f8fa8;
}

/* focus state */
.form-control:focus,
select:focus{
  border-color:#8a2be2 !important;
  box-shadow: 0 0 0 3px rgba(123,44,255,0.2) !important;
  outline: none;
}

/* =========================
   FORM GRID SPACING
========================= */

.row{
  row-gap: 15px;
}

/* =========================
   PRIMARY BUTTON (MODERN)
========================= */

.btn-primary{
  background: linear-gradient(135deg,#7b2cff,#a855f7);
  border:none;
  border-radius: 12px;
  padding: 12px 20px;
  font-weight: 500;
  letter-spacing: 0.3px;
  transition: 0.3s;
  width: 100%;
}

.btn-primary:hover{
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(123,44,255,0.3);
}

/* =========================
   TABLE (PRO DASHBOARD STYLE)
========================= */

.table{
  color:#eaeaff;
  border-collapse: separate;
  border-spacing: 0;
}

.table thead{
  background: rgba(123,44,255,0.15);
  color:#fff;
  font-size: 13px;
  text-transform: uppercase;
}

.table thead th{
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.table tbody td{
  padding: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.table tbody tr{
  transition: 0.2s;
}

.table tbody tr:hover{
  background: rgba(123,44,255,0.08);
}

/* =========================
   STATUS BADGES (IF USED)
========================= */

.badge{
  background: rgba(123,44,255,0.2);
  color:#fff;
  padding:6px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* =========================
   SUBTLE ANIMATIONS
========================= */

.card{
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform: translateY(10px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

/* =========================
   RESPONSIVE (IMPORTANT)
========================= */

@media (max-width: 768px){
  .main{
    margin-left:0;
    padding:15px;
  }

  .btn-primary{
    width:100%;
  }

  .card{
    padding:18px;
  }
}

<div class="card mb-4">
  <h5>Create Batch</h5>

  <div class="row g-3 mt-2">

    <div class="col-md-4">
      <label>Batch Name</label>
      <input id="batchName" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Start Date</label>
      <input type="date" id="startDate" class="form-control">
    </div>

    <div class="col-md-4">
      <label>End Date</label>
      <input type="date" id="endDate" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Total Days</label>
      <input type="number" id="totalDays" class="form-control">
    </div>

    <div class="col-md-4">
      <label>Trainer</label>
      <div class="position-relative">
  <select id="trainerDropdown" class="form-control"></select>
  <i class="fas fa-chevron-down dropdown-icon"></i>
</div>
    </div>

  </div>

  <button onclick="createBatch()" class="btn btn-primary mt-3">
    <i class="fas fa-plus"></i> Create Batch
  </button>
</div>

<!-- TABLE -->
<div class="card">
  <h5>All Batches</h5>

  <table class="table clean-table text-center align-middle">
    <thead>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Trainer</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="batchTable"></tbody>
  </table>

  <div id="batchPagination" class="mt-3 text-center"></div>
</div>

</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editBatchModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Edit Batch</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editBatchId">

        <input class="form-control mb-2" id="editBatchName" placeholder="Batch Name">
        <input class="form-control mb-2" type="date" id="editStartDate">
        <input class="form-control mb-2" type="date" id="editEndDate">

        <select class="form-control mb-2" id="editStatus">
