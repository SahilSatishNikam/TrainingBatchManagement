<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Progress</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}

/* ===== BODY ===== */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: "Times New Roman", serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(6px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* ===== MAIN ===== */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* ===== HEADER / TOPBAR ===== */
.header, .topbar {
    background: var(--card);
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

/* ===== SECTION TITLE ===== */
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* ===== STATS GRID ===== */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* ===== CIRCLE CARDS ===== */
.circle-card {
    background: linear-gradient(145deg, #12121c, #0a0a12);
    border: 1px solid rgba(168,85,247,0.15);
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    transition: 0.4s ease;
    position: relative;
    overflow: hidden;
}

/* glowing border */
.circle-card::after {
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    padding:1px;
    background:linear-gradient(120deg,transparent,#a855f7,transparent);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0;
    transition:0.4s;
}

.circle-card:hover::after {
    opacity:1;
}

.circle-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 0 30px rgba(168,85,247,0.35);
}

.circle-card p {
    margin-top: 10px;
    letter-spacing: 1px;
    color: #bbb;
    font-size: 13px;
}

/* ===== CIRCLE ===== */
.circle {
    width: 110px;
    height: 110px;
    margin: auto;
    position: relative;
}

.circle svg {
    transform: rotate(-90deg);
}

.circle circle {
    fill: none;
    stroke-width: 8;
}

.bg {
    stroke: #222;
}

.progress {
    stroke: var(--purple);
    stroke-dasharray: 314;
    stroke-dashoffset: 314;
    transition: 1.2s ease;
    filter: drop-shadow(0 0 6px #a855f7);
}

.circle-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    font-weight: bold;
}

/* ===== TABLE ===== */
.table-box {
    margin-top: 30px;
    background: linear-gradient(145deg,#111118,#0a0a12);
    border-radius: 18px;
    padding: 20px;
    border: 1px solid rgba(168,85,247,0.1);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 25px rgba(168,85,247,0.08);
}

table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 12px;
}

thead th {
    color: #888;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px;
}

tbody tr {
    background: linear-gradient(135deg,#111122,#0a0a12);
    transition: 0.35s ease;
}

tbody tr td:first-child {
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
}

tbody tr td:last-child {
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
}

tbody tr:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 0 20px rgba(168,85,247,0.3);
}

td {
    padding: 16px;
    font-size: 14px;
}

td:first-child {
    font-weight: 600;
    color: #fff;
}

td:nth-child(2) {
    color: #bbb;
}

/* ===== PROGRESS BAR ===== */
.bar {
    height: 10px;
    background: #1a1a22;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}

.bar-fill {
    height: 100%;
    background: linear-gradient(90deg,#a855f7,#c084fc);
    border-radius: 20px;
    position: relative;
    animation: loadBar 1.5s ease;
}

.bar-fill::after {
    content:"";
    position:absolute;
    width:40%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
    animation: shine 2s infinite;
}

@keyframes loadBar {
    from { width: 0; }
}

@keyframes shine {
    from { left: -50%; }
    to { left: 120%; }
}

/* ===== BADGES ===== */
.badge-custom {
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

.active-b {
    background: rgba(34,197,94,0.1);
    color: #22c55e;
    box-shadow: 0 0 8px rgba(34,197,94,0.4);
}

.completed-b {
    background: rgba(59,130,246,0.1);
    color: #3b82f6;
    box-shadow: 0 0 8px rgba(59,130,246,0.4);
}

.delayed-b {
    background: rgba(239,68,68,0.1);
    color: #ef4444;
    box-shadow: 0 0 8px rgba(239,68,68,0.4);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 992px) {
    .stats {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    .sidebar {
        width: 70px;
    }

    .sidebar a span {
        display: none;
    }

    .main {
        margin-left: 70px;
    }

    .stats {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand">Smart Admin</div>

    <a href="admin_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
    <a href="add_trainer.html"><i class="fas fa-user-plus me-2"></i>Add Trainers</a>
    <a href="trainer.html"><i class="fas fa-users me-2"></i>Trainers</a>
    <a href="assign-batch.html"><i class="fas fa-box me-2"></i>Batches</a>
    <a href="batch-history.html"><i class="fas fa-history me-2"></i>History</a>
    <a href="admin_progress.html" class="active"><i class="fas fa-chart-line me-2"></i>Progress</a>
    <a href="admin_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
    <h4>📊 Training Progress</h4>
</div>

<!-- CIRCLE STATS -->
<div class="stats fade-in">

    <div class="circle-card">
        <div class="circle">
            <svg width="110" height="110">
                <circle class="bg" cx="55" cy="55" r="50"/>
                <circle id="c1" class="progress" cx="55" cy="55" r="50"/>
            </svg>
            <div id="total" class="circle-text">0</div>
        </div>
        <p>TOTAL</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="110" height="110">
                <circle class="bg" cx="55" cy="55" r="50"/>
                <circle id="c2" class="progress" cx="55" cy="55" r="50"/>
            </svg>
            <div id="active" class="circle-text">0</div>
        </div>
        <p>ACTIVE</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="110" height="110">
                <circle class="bg" cx="55" cy="55" r="50"/>
                <circle id="c3" class="progress" cx="55" cy="55" r="50"/>
            </svg>
            <div id="completed" class="circle-text">0</div>
        </div>
        <p>COMPLETED</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="110" height="110">
                <circle class="bg" cx="55" cy="55" r="50"/>
                <circle id="c4" class="progress" cx="55" cy="55" r="50"/>
            </svg>
            <div id="delayed" class="circle-text">0</div>
        </div>
        <p>DELAYED</p>
    </div>

</div>

<!-- TABLE -->
<div class="table-box fade-in">
    <h5>Batch Performance</h5>

    <table>
        <thead>
            <tr>
                <th>Batch</th>
                <th>Trainer</th>
                <th>Progress</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>
    </table>
</div>

</div>

<script>
function logout(){
    localStorage.clear();
    window.location.href="login.html";
}

/* 🔥 AUTO CIRCLE ANIMATION */
function animateCircle(id,value,max=100){
    const circle=document.getElementById(id);
    const radius=50;
    const circumference=2*Math.PI*radius;

    circle.style.strokeDasharray=circumference;

    let percent=(value/max)*100;
    const offset=circumference-(percent/100)*circumference;

    setTimeout(()=>{
        circle.style.strokeDashoffset=offset;
    },300);
}

/* 🔥 RUN AFTER BACKEND LOAD */
setTimeout(()=>{
    animateCircle("c1",document.getElementById("total").innerText,50);
    animateCircle("c2",document.getElementById("active").innerText,50);
    animateCircle("c3",document.getElementById("completed").innerText,50);
    animateCircle("c4",document.getElementById("delayed").innerText,50);
},1200);
</script>

<script src="script.js"></script>

</body>
</html>
