<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Progress Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --primary: linear-gradient(135deg, #667eea, #9c88ff);
    --bg: #f4f6f9;
}

body {
    margin: 0;
    display: flex;
    height: 100vh;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Poppins', sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 230px;
    height: 100%;
    position: fixed;
    background: var(--primary);
    color: white;
}

.sidebar .brand {
    font-size: 20px;
    padding: 18px;
    text-align: center;
    font-weight: bold;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    color: #eee;
    text-decoration: none;
    transition: 0.3s;
    font-size: 14px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.15);
}

.sidebar a.active {
    background: rgba(255,255,255,0.25);
    border-left: 4px solid #fff;
}

/* ===== MAIN ===== */
.main {
    margin-left: 230px;
    width: calc(100% - 230px);
    padding: 15px;
    display: flex;
    flex-direction: column;
}

/* ===== TOPBAR ===== */
.topbar {
    background: white;
    padding: 12px 18px;
    border-radius: 10px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ===== KPI ===== */
.kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 12px;
}

.kpi {
    color: white;
    border-radius: 10px;
    text-align: center;
    padding: 10px;
}

.kpi h2 {
    margin: 5px 0 0;
    font-size: 24px;
}

.total { background:#667eea; }
.active { background:#007bff; }
.completed { background:#28a745; }
.delayed { background:#dc3545; }

/* ===== TABLE CARD ===== */
.table-card {
    flex: 1;
    background: white;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
}

/* TABLE FIX HEIGHT */
.table-responsive {
    overflow-y: auto;
    height: 100%;
}

/* PROGRESS BAR */
.progress {
    height: 12px;
    border-radius: 10px;
}

.progress-bar {
    font-size: 10px;
}

/* STATUS BADGE */
.badge-status {
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
}

.completed-badge { background:#28a745; color:white; }
.active-badge { background:#007bff; color:white; }
.delayed-badge { background:#dc3545; color:white; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand">🚀 Smart Admin</div>

    <a href="admin_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
    <a href="add_trainer.html"><i class="fas fa-user-plus me-2"></i>Add Trainers</a>
    <a href="trainer.html"><i class="fas fa-users me-2"></i>Trainers</a>
    <a href="assign-batch.html"><i class="fas fa-box me-2"></i>Batches</a>
    <a href="batch-history.html"><i class="fas fa-history me-2"></i>History</a>
    <a href="admin_progress.html" class="active"><i class="fas fa-chart-line me-2"></i>Progress</a>
    <a href="notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
    <a href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h6 class="mb-0">📊 Training Progress</h6>
        <i class="fas fa-bell"></i>
    </div>

    <!-- KPI -->
    <div class="kpi-row">
        <div class="kpi total">TOTAL<h2 id="total">0</h2></div>
        <div class="kpi active">ACTIVE<h2 id="active">0</h2></div>
        <div class="kpi completed">COMPLETED<h2 id="completed">0</h2></div>
        <div class="kpi delayed">DELAYED<h2 id="delayed">0</h2></div>
    </div>

    <!-- TABLE -->
    <div class="table-card">
        <h6>Batch Performance</h6>

        <div class="table-responsive">
            <table class="table table-sm align-middle">
                <thead>
                    <tr>
                        <th>Batch</th>
                        <th>Trainer</th>
                        <th style="width:40%">Progress</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
