<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f6fb; font-family:Poppins; }

.header {
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    color:#fff;
    padding:15px;
    font-size:20px;
}

.card {
    border:none;
    border-radius:12px;
    padding:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.kpi { color:#fff; text-align:center; }
.kpi h2 { font-size:28px; }

.total {background:#667eea;}
.active {background:#007bff;}
.completed {background:#28a745;}
.delayed {background:#dc3545;}

.progress { height:14px; }
</style>

</head>

<body>

<div class="header">📊 Admin Training Dashboard</div>

<div class="container-fluid mt-3">

<div class="row mb-3">

<div class="col-md-3"><div class="card kpi total">TOTAL<h2 id="total">0</h2></div></div>
<div class="col-md-3"><div class="card kpi active">ACTIVE<h2 id="active">0</h2></div></div>
<div class="col-md-3"><div class="card kpi completed">COMPLETED<h2 id="completed">0</h2></div></div>
<div class="col-md-3"><div class="card kpi delayed">DELAYED<h2 id="delayed">0</h2></div></div>

</div>

<div class="row">

<!-- TABLE -->

<div class="col-md-8">
<div class="card">
<h5>Batch Performance</h5>
<table class="table">
<thead>
<tr>
<th>Batch</th>
<th>Trainer</th>
<th>Progress</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<!-- SIDE -->

<div class="col-md-4">
<div class="card">

<select id="batchSelect" class="form-control mb-3"></select>

<p>Total Days: <b id="tDays">0</b></p>
<p>Completed: <b id="cDays">0</b></p>
<p>Remaining: <b id="rDays">0</b></p>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<p id="percent">0%</p>

</div>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
