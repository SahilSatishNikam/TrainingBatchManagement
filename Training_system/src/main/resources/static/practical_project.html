<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practicals & Projects</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --purple:#7c4dff;
    --dark:#0f0f1a;
    --card:#1c1c2b;
}

/* BODY */
body {
    margin:0;
    display:flex;
    background:var(--dark);
    color:white;
    font-family:'Poppins',sans-serif;
}

/* ===== SIDEBAR (UNCHANGED) ===== */
/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#111326,#0b0b14);
  border-right:1px solid var(--border);
}

.sidebar .brand{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background: linear-gradient(45deg,#8b5cf6,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sidebar a{
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover,
.sidebar a.active{
  background:rgba(139,92,246,0.15);
  color:#fff;
  border-left:4px solid var(--purple);
  box-shadow:0 0 10px var(--glow);
}
/* MAIN */
.main {
    margin-left:240px;
    width:100%;
    padding:20px;
}

/* CARD */
.card {
    background:var(--card);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

/* ===== INPUT FIX ===== */
input, select {
    background:#111 !important;
    color:#fff !important;
    border:1px solid #444 !important;
}

input::placeholder {
    color:#aaa !important;
}

select option {
    background:#111;
    color:#fff;
}

input:focus, select:focus {
    border-color:var(--purple) !important;
    box-shadow:0 0 5px var(--purple);
}

input {
    caret-color:#fff;
}

/* TABLE */
.table {
    margin-top:10px;
    border-radius:10px;
    overflow:hidden;
}
.table thead {
    background:var(--purple);
}

/* STATUS */
.status {
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
}
.pending { background:#ff9800; }
.completed { background:#4caf50; }

/* BUTTONS */
.btn-purple {
    background:var(--purple);
    color:white;
}
.btn-purple:hover {
    background:#5e35b1;
}

.btn-delete {
    background:#ff5252;
    color:white;
}
.btn-delete:hover {
    background:#d32f2f;
}

.btn-status {
    background:#00c853;
    color:white;
}
.btn-status:hover {
    background:#009624;
}
</style>
</head>

<body>

<!-- ===== SIDEBAR (UNCHANGED) ===== -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
  <a href="trainer_batches.html"><i class="fas fa-layer-group me-2"></i>My Batches</a>
  <a href="training_sessions.html"><i class="fas fa-chalkboard-teacher me-2"></i>Sessions</a>
  <a href="practical_project.html"  class="active"><i class="fas fa-laptop-code me-2"></i>Practicals</a>
  <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
  <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>


<!-- ===== MAIN ===== -->
<div class="main">

<h4>🧪 Practicals & 🚀 Projects</h4>

<!-- PRACTICAL -->
<div class="card">

<h5>Practicals</h5>

<div class="row mb-3">
    <div class="col-md-3">
        <select id="batchSelect" onchange="loadPracticals(this.value)" class="form-control"></select>
    </div>

    <div class="col-md-3">
        <input type="text" id="pTitle" placeholder="Practical Title" class="form-control">
    </div>

    <div class="col-md-3">
        <input type="number" id="marks" placeholder="Marks" class="form-control">
    </div>

    <div class="col-md-3">
        <button class="btn btn-purple w-100" onclick="createPractical()">Add Practical</button>
    </div>
</div>

<table class="table table-dark text-center">
<thead>
<tr>
    <th>Title</th>
    <th>Status</th>
    <th>Marks</th>
    <th>Actions</th>
</tr>
</thead>

<tbody id="practicalTable"></tbody>
</table>

</div>

<!-- PROJECT -->
<div class="card">

<h5>Projects</h5>

<div class="row mb-3">
    <div class="col-md-3">
        <select id="projectBatch" class="form-control"></select>
    </div>

    <div class="col-md-3">
        <input type="text" id="projectTitle" placeholder="Project Title" class="form-control">
    </div>

    <div class="col-md-3">
        <input type="date" id="deadline" class="form-control">
    </div>

    <div class="col-md-3">
        <input type="number" id="score" placeholder="Score" class="form-control">
    </div>

    <div class="col-md-3 mt-2">
        <button class="btn btn-purple w-100" onclick="createProject()">Add Project</button>
    </div>
</div>

<table class="table table-dark text-center">
<thead>
<tr>
    <th>Title</th>
    <th>Deadline</th>
    <th>Status</th>
    <th>Score</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="projectTable"></tbody>
</table>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
