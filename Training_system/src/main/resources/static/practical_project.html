<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Practicals & Projects</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
	--primary: linear-gradient(135deg, #6777ef, #9c88ff);
	--bg: #f4f6f9;
}

body {
	margin: 0;
	display: flex;
	background: var(--bg);
	font-family: 'Poppins', sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar {
	width: 240px;
	height: 100vh;
	position: fixed;
	background: var(--primary);
	color: white;
}

.sidebar .brand {
	font-size: 22px;
	padding: 20px;
	font-weight: bold;
	text-align: center;
}

.sidebar a {
	display: flex;
	align-items: center;
	padding: 14px 20px;
	color: #eee;
	text-decoration: none;
	transition: 0.3s;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.15);
	padding-left: 25px;
}

.sidebar a.active {
	background: rgba(255, 255, 255, 0.25);
	border-left: 4px solid #fff;
}

/* ===== MAIN ===== */
.main {
	margin-left: 240px;
	width: 100%;
	padding: 20px;
}

/* ===== TOPBAR ===== */
.topbar {
	background: white;
	padding: 15px 20px;
	border-radius: 10px;
	margin-bottom: 20px;
	display: flex;
	justify-content: space-between;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

/* ===== CARD ===== */
.card {
	border-radius: 15px;
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
}

/* ===== TABLE ===== */
.table thead {
	background: #6777ef;
	color: white;
}

/* ===== BADGES ===== */
.badge-status {
	padding: 6px 10px;
	border-radius: 10px;
}
</style>

<script>
	// 🔒 Role Protection
	(function() {
		const role = localStorage.getItem("role");
		if (!role || role !== "TRAINER") {
			alert("Access denied");
			window.location.href = "login.html";
		}
	})();
</script>

</head>

<body>

	<!-- ===== SIDEBAR ===== -->
	<div class="sidebar">
		<div class="brand">🎓 Smart Trainer</div>

	<a href="trainer_dashboard.html">
        <i class="fas fa-home me-2"></i>Dashboard
    </a>

    <a href="create_batch.html">
        <i class="fas fa-plus me-2"></i>Create Batch
    </a>

    <a href="trainer_batches.html">
        <i class="fas fa-layer-group me-2"></i>My Batches
    </a>

    <a href="training_sessions.html">
        <i class="fas fa-layer-group me-2"></i>Create Session
    </a>

    <a href="practical_project.html"   class="active">
        <i class="fas fa-laptop-code me-2"></i>Practicals & Projects
    </a>

    <a href="mock_interview.html">
        <i class="fas fa-microphone me-2"></i>Mock Interviews
    </a>

    <a href="update_progress.html">
        <i class="fas fa-chart-line me-2"></i>Progress
    </a>

    <a href="trainer_notification.html">
        <i class="fas fa-bell me-2"></i>Notifications
    </a>

    <a href="#">
        <i class="fas fa-cog me-2"></i>Settings
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
    </a>
	</div>

	<!-- ===== MAIN ===== -->
	<div class="main">

		<!-- TOPBAR -->
		<div class="topbar">
			<h5>🧪 Practicals & 🚀 Projects</h5>
			<button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
		</div>

		<!-- ===== PRACTICALS ===== -->
		<div class="card p-3 mb-4">
			<h5>🧪 Practicals</h5>

			<div class="row mb-3">
				<div class="col-md-3">
					<select id="batchSelect" class="form-control" onchange="loadPracticals(this.value)"></select>
				</div>

				<div class="col-md-3">
					<input type="text" id="pTitle" class="form-control"
						placeholder="Practical Title">
				</div>

				<div class="col-md-3">
					<input type="number" id="marks" class="form-control"
						placeholder="Marks">
				</div>

				<div class="col-md-3">
					<button class="btn btn-success w-100" onclick="createPractical()">Add
						Practical</button>
				</div>
			</div>

			<table class="table text-center">
				<thead>
					<tr>
						<th>Title</th>
						<th>Status</th>
						<th>Marks</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody id="practicalTable"></tbody>
			</table>
		</div>

		<!-- ===== PROJECTS ===== -->
		<div class="card p-3">
			<h5>🚀 Projects</h5>


			<div class="row mb-3">
				<div class="col-md-3">
					<select id="projectBatch" class="form-control"></select>
				</div>

				<div class="col-md-3">
					<input type="text" id="projectTitle" class="form-control"
						placeholder="Project Title">
				</div>

				<div class="col-md-3">
					<input type="date" id="deadline" class="form-control">
				</div>

				<div class="col-md-3">
					<input type="number" id="score" class="form-control"
						placeholder="Score">
				</div>
				<div class="col-md-3">
					<button class="btn btn-primary w-100" onclick="createProject()">Add
						Project</button>
				</div>
			</div>
			<table class="table text-center">
				<thead>
					<tr>
						<th>Title</th>
						<th>Deadline</th>
						<th>Status</th>
						<th>Score</th>
						<th>Action</th>
					</tr>
				</thead>
				<tbody id="projectTable"></tbody>
			</table>
		</div>

	</div>

	<script>
		function logout() {
			localStorage.clear();
			window.location.href = "login.html";
		}
	</script>

	<script src="script.js"></script>

</body>
</html>
