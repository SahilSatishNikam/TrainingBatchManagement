<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Trainer</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
	--primary: linear-gradient(135deg, #6777ef, #9c88ff);
	--bg: #f4f6f9;
}

body {
	margin: 0;
	display: flex;
	background: var(--bg);
	font-family: 'Poppins', sans-serif;
}

/* ===== SAME SIDEBAR AS DASHBOARD ===== */
.sidebar {
	width: 240px;
	height: 100vh;
	position: fixed;
	background: var(--primary);
	color: white;
}

.sidebar .brand {
	font-size: 22px;
	padding: 20px;
	font-weight: bold;
	text-align: center;
}

.sidebar a {
	display: flex;
	align-items: center;
	padding: 14px 20px;
	color: #eee;
	text-decoration: none;
	transition: 0.3s;
}

.sidebar a i {
	width: 25px;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.15);
	padding-left: 25px;
}

.sidebar a.active {
	background: rgba(255, 255, 255, 0.25);
	border-left: 4px solid #fff;
}

/* ===== MAIN ===== */
.main {
	margin-left: 240px;
	width: 100%;
	padding: 20px;
}

/* ===== TOPBAR (same as dashboard) ===== */
.topbar {
	background: white;
	padding: 15px 20px;
	border-radius: 10px;
	margin-bottom: 20px;
	display: flex;
	justify-content: space-between;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

/* ===== CARD ===== */
.card {
	border: none;
	border-radius: 15px;
	padding: 25px;
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
}

/* ===== FORM ===== */
.form-control, .form-select {
	border-radius: 8px;
	padding: 10px;
	transition: 0.3s;
}

.form-control:focus, .form-select:focus {
	border-color: #6777ef;
	box-shadow: 0 0 8px rgba(103, 119, 239, 0.3);
}

/* ===== UPLOAD ===== */
.upload-box {
    border: 2px dashed #ccc;
    padding: 25px;
    text-align: center;
    border-radius: 12px;
    background: #fafafa;
    cursor: pointer;
    transition: 0.3s;
    display: block;
}

.upload-box:hover {
    border-color: #6777ef;
    background: #f0f3ff;
}

.upload-box input {
    display: none; /* ✅ hide input safely */
}

.upload-box img {
    width: 80px;
    border-radius: 50%;
    margin-top: 10px;
}
/* ===== BUTTON ===== */
.btn-primary {
	background: linear-gradient(135deg, #667eea, #764ba2);
	border: none;
}
</style>
</head>

<body>

	<!-- ✅ SAME SIDEBAR -->
	<div class="sidebar">
		<div class="brand">🚀 Smart Admin</div>

		<a href="admin_dashboard.html"> <i class="fas fa-home"></i>
			Dashboard
		</a> <a href="add_trainer.html" class="active"> <i
			class="fas fa-user-plus"></i> Add Trainers
		</a> <a href="trainer.html"> <i class="fas fa-users"></i> Trainers
		</a> <a href="assign-batch.html"> <i class="fas fa-box"></i> Batches
		</a> <a href="batch-history.html"> <i class="fas fa-history"></i>
			Batch History
		</a> <a href="#"> <i class="fas fa-chart-line"></i> Progress
		</a> <a href="#"> <i class="fas fa-bell"></i> Notifications
		</a> <a href="login.html" onclick="logout()"> <i
			class="fas fa-sign-out-alt"></i> Logout
		</a>
	</div>

	<!-- MAIN -->
	<div class="main">

		<!-- TOPBAR -->
		<div class="topbar">
			<h5>Add Trainer 👨‍🏫</h5>
			<button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
		</div>

		<!-- FORM -->
		<div class="card">

			<div class="row g-3">

				<div class="col-md-6">
					<input type="text" id="name" class="form-control"
						placeholder="First Name*">
				</div>

				<div class="col-md-6">
					<input type="text" id="lastName" class="form-control"
						placeholder="Last Name">
				</div>

				<div class="col-md-6">
					<input type="email" id="email" class="form-control"
						placeholder="Email*">
				</div>

				<div class="col-md-6">
					<input type="password" id="password" class="form-control"
						placeholder="Password*">
				</div>

				<div class="col-md-6">
					<select id="gender" class="form-select">
						<option value="">Select Gender</option>
						<option>Male</option>
						<option>Female</option>
					</select>
				</div>

				<div class="col-md-6">
					<input type="text" id="mobile" class="form-control"
						placeholder="Mobile">
				</div>

				<div class="col-md-6">
					<select id="department" class="form-select">
						<option value="">Department</option>
						<option>IT / Software</option>
						<option>Data Science</option>
						<option>Cloud</option>
						<option>AI&ML</option>
						<option>Java Full Stack</option>
					</select>
				</div>

				<div class="col-md-6">
					<input type="text" id="designation" class="form-control"
						placeholder="Designation">
				</div>

				<div class="col-md-6">
					<input type="date" id="joiningDate" class="form-control">
				</div>

				<div class="col-md-6">
					<input type="text" id="education" class="form-control"
						placeholder="Education">
				</div>

				<div class="col-12">
					<textarea id="address" class="form-control" placeholder="Address"></textarea>
				</div>

				<!-- Upload -->
				<div class="col-12">   
					<label class="upload-box"> <i
						class="fas fa-cloud-upload-alt fa-2x text-muted"></i>
						<p>Click to Upload Photo</p> <input type="file" id="photo"
						accept="image/*" onchange="previewImage(event)"> <img
						id="preview" style="display: none;">
					</label>
				</div>
			</div>

			<div class="mt-4">
				<button class="btn btn-primary" onclick="saveTrainer()">
					<i class="fas fa-save"></i> Save Trainer
				</button>
			</div>

		</div>

	</div>

	<script>
		function logout() {
			localStorage.clear();
			window.location.href = "login.html";
		}

		function previewImage(event) {
		    const file = event.target.files[0];

		    if (!file) return;

		    const img = document.getElementById("preview");

		    img.src = URL.createObjectURL(file);
		    img.style.display = "block";
		}
	</script>

	<script src="script.js"></script>

</body>
</html>
