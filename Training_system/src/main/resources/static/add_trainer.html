<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Trainer</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
/* ===== VARIABLES ===== */
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

/* ===== CARD ===== */
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 25px;
    border: 1px solid var(--border);
    transition: 0.3s;
    color:white;
}

.card:hover {
    box-shadow: 0 10px 35px rgba(0,0,0,0.5);
    transform: translateY(-3px);
}

/* ===== FORM ===== */
.form-control, .form-select {
    background: #0d0f14;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
}

.form-control::placeholder {
    color: var(--muted);
}

.form-control:focus, .form-select:focus {
    border-color: var(--purple);
    box-shadow: 0 0 10px var(--purple-glow);
    background: #0d0f14;
    color: white;
}

/* ===== UPLOAD BOX ===== */
.upload-box {
    border: 2px dashed var(--border);
    padding: 25px;
    text-align: center;
    border-radius: 14px;
    background: #0d0f14;
    cursor: pointer;
    transition: 0.3s;
    display: block;
}

.upload-box:hover {
    border-color: var(--purple);
    background: var(--purple-soft);
}

.upload-box input {
    display: none;
    color: white;
}

.upload-box img {
    width: 80px;
    border-radius: 50%;
    margin-top: 10px;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(135deg, #9333ea, #7e22ce);
    border: none;
    border-radius: 20px;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #a855f7;
}
/* Make calendar icon visible in dark mode */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
    opacity: 0.8;
}

input[type="date"]::-webkit-calendar-picker-indicator:hover {
    opacity: 1;
}

/* ===== ANIMATIONS ===== */
.card, .upload-box, .form-control {
    animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 992px) {

    .sidebar {
        transform: translateX(-100%);
        z-index: 1000;
    }

    .sidebar.active {
        transform: translateX(0);
    }

    .main {
        margin-left: 0;
    }
}

@media (max-width: 768px) {

    .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}

@media (max-width: 576px) {

    .card {
        padding: 18px;
    }

    .form-control, .form-select {
        font-size: 14px;
    }
}

.text-muted {
    --bs-text-opacity: 1;
    color: antiquewhite;
}
</style>
</head>

<body>

	<!-- ✅ SAME SIDEBAR -->
	<div class="sidebar">
		<div class="brand">Smart Admin</div>

		<a href="admin_dashboard.html"> <i class="fas fa-home"></i>
			Dashboard
		</a> <a href="add_trainer.html" class="active"> <i
			class="fas fa-user-plus"></i> Add Trainers
		</a> <a href="trainer.html"> <i class="fas fa-users"></i> Trainers
		</a> <a href="assign-batch.html"> <i class="fas fa-box"></i> Batches
		</a> <a href="batch-history.html"> <i class="fas fa-history"></i>
			Batch History
		</a> <a href="#"> <i class="fas fa-chart-line"></i> Progress
		</a> <a href="#"> <i class="fas fa-bell"></i> Notifications
		</a> <a href="login.html" onclick="logout()"> <i
			class="fas fa-sign-out-alt"></i> Logout
		</a>
	</div>

	<!-- MAIN -->
	<div class="main">

		<!-- TOPBAR -->
		<div class="topbar">
			<h5>Add Trainer 👨‍🏫</h5>
			<button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
		</div>

		<!-- FORM -->
		<div class="card">

			<div class="row g-3">

				<div class="col-md-6">
					<input type="text" id="name" class="form-control"
						placeholder="First Name*">
				</div>

				<div class="col-md-6">
					<input type="text" id="lastName" class="form-control"
						placeholder="Last Name">
				</div>

				<div class="col-md-6">
					<input type="email" id="email" class="form-control"
						placeholder="Email*">
				</div>

				<div class="col-md-6">
					<input type="password" id="password" class="form-control"
						placeholder="Password*">
				</div>

				<div class="col-md-6">
					<select id="gender" class="form-select">
						<option value="">Select Gender</option>
						<option>Male</option>
						<option>Female</option>
					</select>
				</div>

				<div class="col-md-6">
					<input type="text" id="mobile" class="form-control"
						placeholder="Mobile">
				</div>

				<div class="col-md-6">
					<select id="department" class="form-select">
						<option value="">Department</option>
						<option>IT / Software</option>
						<option>Data Science</option>
						<option>Cloud</option>
						<option>AI&ML</option>
						<option>Java Full Stack</option>
					</select>
				</div>

				<div class="col-md-6">
					<input type="text" id="designation" class="form-control"
						placeholder="Designation">
				</div>

				<div class="col-md-6">
					<input type="date" id="joiningDate" class="form-control">
				</div>

				<div class="col-md-6">
					<input type="text" id="education" class="form-control"
						placeholder="Education">
				</div>

				<div class="col-12">
					<textarea id="address" class="form-control" placeholder="Address"></textarea>
				</div>

				<!-- Upload -->
				<div class="col-12">   
					<label class="upload-box"> <i
						class="fas fa-cloud-upload-alt fa-2x text-muted"></i>
						<p>Click to Upload Photo</p> <input type="file" id="photo"
						accept="image/*" onchange="previewImage(event)"> <img
						id="preview" style="display: none;">
					</label>
				</div>
			</div>

			<div class="mt-4">
				<button class="btn btn-primary" onclick="saveTrainer()">
					<i class="fas fa-save"></i> Save Trainer
				</button>
			</div>

		</div>

	</div>

	<script>
		function logout() {
			localStorage.clear();
			window.location.href = "login.html";
		}

		function previewImage(event) {
		    const file = event.target.files[0];

		    if (!file) return;

		    const img = document.getElementById("preview");

		    img.src = URL.createObjectURL(file);
		    img.style.display = "block";
		}
	</script>

	<script src="script.js"></script>

</body>
</html>
