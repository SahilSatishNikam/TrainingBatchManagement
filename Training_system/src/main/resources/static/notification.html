<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
	--primary: linear-gradient(135deg, #6777ef, #9c88ff);
	--bg: #f4f6f9;
}

body {
	margin: 0;
	display: flex;
	background: var(--bg);
	font-family: 'Poppins', sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar {
	width: 240px;
	height: 100vh;
	position: fixed;
	background: var(--primary);
	color: white;
}

.sidebar .brand {
	font-size: 22px;
	padding: 20px;
	font-weight: bold;
	text-align: center;
}

.sidebar a {
	display: flex;
	align-items: center;
	padding: 14px 20px;
	color: #eee;
	text-decoration: none;
	transition: 0.3s;
}

.sidebar a i {
	width: 25px;
}

.sidebar a:hover {
	background: rgba(255, 255, 255, 0.15);
	padding-left: 25px;
}

.sidebar a.active {
	background: rgba(255, 255, 255, 0.25);
	border-left: 4px solid #fff;
}

/* ===== MAIN ===== */
.main {
	margin-left: 240px;
	width: 100%;
	padding: 20px;
}

/* ===== TOPBAR ===== */
.topbar {
	background: white;
	padding: 15px 20px;
	border-radius: 10px;
	margin-bottom: 20px;
	display: flex;
	justify-content: space-between;
	align-items: center;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
}

/* ===== CARD ===== */
.card {
	border-radius: 15px;
	box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
}

/* ===== NOTIFICATIONS ===== */
.notification-item {
	border-left: 4px solid #6777ef;
	padding: 12px;
	margin-bottom: 10px;
	background: #fff;
	border-radius: 8px;
	transition: 0.3s;
}

.notification-item:hover {
	transform: translateX(5px);
	background: #f8f9ff;
}

.time {
	font-size: 12px;
	color: gray;
}
</style>

<script>
	// 🔒 Protect Page
	(function() {
		const role = localStorage.getItem("role");
		if (!role) {
			alert("Access denied");
			window.location.href = "login.html";
		}
	})();
</script>

</head>

<body>

	<!-- ===== SIDEBAR ===== -->
	<div class="sidebar">
		<div class="brand">🎓 Smart Trainer</div>

		<a href="trainer_dashboard.html"> <i class="fas fa-home me-2"></i>Dashboard
		</a> <a href="create_batch.html"> <i class="fas fa-plus me-2"></i>Create
			Batch
		</a> <a href="trainer_batches.html"> <i
			class="fas fa-layer-group me-2"></i>My Batches
		</a> <a href="training_sessions.html"> <i
			class="fas fa-layer-group me-2"></i>Create Session
		</a> <a href="practical_project.html"> <i
			class="fas fa-laptop-code me-2"></i>Practicals & Projects
		</a> <a href="mock_interview.html"> <i class="fas fa-microphone me-2"></i>Mock
			Interviews
		</a> <a href="update_progress.html"> <i class="fas fa-chart-line me-2"></i>Progress
		</a> <a href="notification.html" class="active"> <i
			class="fas fa-bell me-2"></i>Notifications
		</a> <a href="#"> <i class="fas fa-cog me-2"></i>Settings
		</a> <a href="#" onclick="logout()"> <i
			class="fas fa-sign-out-alt me-2"></i>Logout
		</a>
	</div>

	<!-- ===== MAIN ===== -->
	<div class="main">

		<!-- TOPBAR -->
		<div class="topbar">
			<h5>🔔 Notifications</h5>
			<button class="btn btn-sm btn-danger" onclick="clearNotifications()">
				Clear All</button>
		</div>

		<!-- CARD -->
		<div class="card p-3">

			<div id="notificationList"></div>

			<!-- ✅ ADD THIS -->
			<div id="emptyMsg"
				style="display: none; text-align: center; margin-top: 10px;">
				No notifications</div>

		</div>

	</div>

	<script src="script.js"></script>

	<script
		src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

</body>
</html>
