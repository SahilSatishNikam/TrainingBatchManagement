<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="style.css" rel="stylesheet" />

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* ================= GLOBAL ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Times New Roman", Times, serif;
}

/* ================= BODY ================= */
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    background-image: url("uploads/login_img.jpeg");
    background-size: cover;
    background-position: center;

    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    color: white;

    /* Prevent navbar overlap */
    padding-top: 80px;
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 18px 60px;

    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;

    background: rgba(10,10,20,0.7);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

/* LOGO */
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
}

.logo-icon {
    width: 50px;
    height: 50px;
    transition: 0.3s;
}

.logo-text {
    font-size: 24px;
    background: linear-gradient(45deg, #ffffff, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* LOGO HOVER */
.logo:hover .logo-icon {
    transform: scale(1.1);
}

/* ================= NAV LINKS ================= */
.nav-links {
    display: flex;
    justify-content: center;
    gap: 40px;
    list-style: none;
}

.nav-links li {
    color: white;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
}

.nav-links li:hover {
    color: #a855f7;
    transform: translateY(-2px);
}

/* RIGHT BUTTON */
.nav-right {
    justify-self: end;
}

.nav-btn {
    background: linear-gradient(45deg, #7c3aed, #2563eb);
    border: none;
    padding: 8px 20px;
    border-radius: 8px;
    color: white;
    transition: 0.3s;
}

.nav-btn:hover {
    transform: scale(1.05);
}

/* ================= LOGIN CONTAINER ================= */
.login-container {
    background: rgba(0, 0, 0, 0.7);
    padding: 30px;
    border-radius: 15px;
    width: 350px;

    box-shadow: 0 0 25px rgba(128, 0, 255, 0.6);
    backdrop-filter: blur(10px);

    animation: fadeUp 0.8s ease;
}

/* HEADING */
h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #d1b3ff;
}

/* ================= INPUT ================= */
.form-control {
    border: 1px solid #6a0dad;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
    transition: 0.3s;
}

.form-control::placeholder {
    color: #aaa;
}

.form-control:focus {
    border-color: #bb86fc;
    box-shadow: 0 0 8px #bb86fc;
    background-color: #1a1a2e;
}

/* ================= BUTTON ================= */
.btn-primary {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);

    color: #fff !important;
    border-radius: 12px;
    font-weight: bold;
    padding: 10px;

    transition: 0.3s;
    box-shadow: 0 4px 20px rgba(128, 0, 255, 0.3);
}

.btn-primary:hover {
    background: rgba(123, 47, 247, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(123, 47, 247, 0.6);
}

.btn-primary:active {
    transform: scale(0.97);
}

/* ================= ANIMATION ================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<!-- ✅ NAVBAR (separate file use) -->
<nav class="navbar" th:fragment="navbar">
    
    <!-- LOGO WITH ICON -->
    <div class="logo">
        <svg class="logo-icon" viewBox="0 0 100 100">
            <defs>
                <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7c3aed"/>
                    <stop offset="100%" stop-color="#2563eb"/>
                </linearGradient>
            </defs>

            <!-- Cloud -->
            <path d="M30 60 Q20 60 20 50 Q20 40 30 40 Q35 30 50 30 Q65 30 70 40 Q80 40 80 50 Q80 60 70 60 Z"
                  fill="url(#cloudGrad)"/>

            <!-- Arrow -->
            <path d="M35 55 Q50 40 70 45"
                  stroke="white"
                  stroke-width="4"
                  fill="none"
                  stroke-linecap="round"/>

            <polygon points="68,42 78,45 70,52" fill="white"/>
        </svg>

        <span class="logo-text">FortuneCloud</span>
    </div>

    <!-- CENTER LINKS -->
    <ul class="nav-links">
        <li>Home</li>
        <li>About</li>
        <li>Contact Us</li>
    </ul>

    <!-- RIGHT BUTTON -->
    <div class="nav-right">
        <button class="nav-btn">Sign in</button>
    </div>

</nav>
<body class="p-4">
<div class="login-container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email" class="form-control mb-2">
    <input type="password" id="password" placeholder="Password" class="form-control mb-2">

    <button onclick="login()" class="btn btn-primary w-100">Login</button>
</div>

<!-- ✅ TOAST (ADDED) -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
