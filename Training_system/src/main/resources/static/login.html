<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="style.css" rel="stylesheet" />

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* 🌌 Background */
body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("uploads/login_img.jpeg"); /* path to your image */
    background-size: cover; 
}

/* 🟪 Login Container */
.login-container {
    background: rgba(0, 0, 0, 0.7);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    box-shadow: 0 0 20px rgba(128, 0, 255, 0.6);
    backdrop-filter: blur(10px);
}

/* 🟣 Heading */
h2 {
    color: #d1b3ff;
    text-align: center;
    margin-bottom: 20px;
}

/* 🔲 Input Fields */
.form-control {
    background-color: #1a1a2e;
    border: 1px solid #6a0dad;
    color: #fff;
    border-radius: 8px;
    padding: 10px;
}

.form-control::placeholder {
    color: #aaa;
}

.form-control:focus {
    border-color: #bb86fc;
    box-shadow: 0 0 8px #bb86fc;
    background-color: #1a1a2e;
    color: #fff;
}

/* 🌫 Glass Button */
.btn-primary {
    background: rgba(255, 255, 255, 0.08); /* transparent glass */
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    color: #ffffff !important;
    border-radius: 12px;
    font-weight: bold;
    padding: 10px;
    transition: all 0.3s ease;

    box-shadow: 0 4px 20px rgba(128, 0, 255, 0.3);
}

/* ✨ Hover Effect */
.btn-primary:hover {
    background: rgba(123, 47, 247, 0.25); /* purple tint */
    border: 1px solid rgba(123, 47, 247, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 6px 25px rgba(123, 47, 247, 0.6);
}

/* 🎯 Click Effect */
.btn-primary:active {
    transform: scale(0.97);
    box-shadow: 0 2px 10px rgba(123, 47, 247, 0.4);
}

/* 🔔 Focus Glow */
.btn-primary:focus {
    box-shadow: 0 0 12px rgba(123, 47, 247, 0.8);
}
</style>
</head>

<body class="p-4">
<div class="login-container">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email" class="form-control mb-2">
    <input type="password" id="password" placeholder="Password" class="form-control mb-2">

    <button onclick="login()" class="btn btn-primary w-100">Login</button>
</div>

<!-- ✅ TOAST (ADDED) -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="toast" class="toast text-white border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
