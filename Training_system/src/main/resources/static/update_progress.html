<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Progress Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root{
    --purple:#7c4dff;
    --dark:#0f0f1a;
    --card:#1a1a2e;
    --text:#ffffff;
}

/* BODY */
body{
    margin:0;
    display:flex;
    background:var(--dark);
    color:var(--text);
    font-family:'Poppins',sans-serif;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#111326,#0b0b14);
  border-right:1px solid var(--border);
}

.sidebar .brand{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background: linear-gradient(45deg,#8b5cf6,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sidebar a{
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover,
.sidebar a.active{
  background:rgba(139,92,246,0.15);
  color:#fff;
  border-left:4px solid var(--purple);
  box-shadow:0 0 10px var(--glow);
}
/* MAIN */
.main{
    margin-left:240px;
    width:calc(100% - 240px);
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
}

/* CARD */
.card{
    background:var(--card);
    border:none;
    border-radius:16px;
    padding:18px;
    box-shadow:0 0 15px rgba(124,77,255,0.2);
}

/* INPUT / SELECT */
.form-control{
    background:#111 !important;
    color:#fff !important;
    border:1px solid #444 !important;
}
.form-control::placeholder{
    color:#aaa;
}
.form-control:focus{
    border-color:var(--purple) !important;
    box-shadow:0 0 6px var(--purple);
}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
}
.stat-card{
    padding:20px;
    border-radius:15px;
    text-align:center;
    font-weight:bold;
    transition:0.3s;
}
.stat-card:hover{
    transform:translateY(-5px);
}
.card-total{
    background:linear-gradient(135deg,#7c4dff,#651fff);
}
.card-completed{
    background:linear-gradient(135deg,#00c853,#00e676);
}
.card-remaining{
    background:linear-gradient(135deg,#ff1744,#d50000);
}

/* MIDDLE */
.middle{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

/* CIRCLE */
.circle-box{
    position:relative;
    width:150px;
    margin:auto;
}
.circle-box svg{
    transform:rotate(-90deg);
}
.circle-text{
    position:absolute;
    top:55px;
    left:0;
    right:0;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* PROGRESS BAR */
.progress{
    height:20px;
    border-radius:20px;
    background:#111;
}
.progress-bar{
    background:linear-gradient(135deg,#7c4dff,#651fff);
}

/* BOTTOM */
.bottom{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:16px;
}

.card{
 color: aliceblue;
}
/* BUTTON */
.btn-purple{
    background:linear-gradient(135deg,#7c4dff,#651fff);
    border:none;
    color:#fff;
}
.btn-purple:hover{
    transform:scale(1.05);
}



/* MILESTONE */
.milestone{
    width:100%;
    border:none;
    border-radius:20px;
    padding:10px;
    margin-top:10px;
    background:#222;
    color:#bbb;
}
.milestone.active{
    background:linear-gradient(135deg,#7c4dff,#651fff);
    color:#fff;
}
</style>
</head>

<body>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar">
    <div class="brand">🎓 Smart Trainer</div>

    <a href="trainer_dashboard.html" class="active"><i class="fas fa-home me-2"></i>Dashboard</a>
    <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
    <a href="trainer_batches.html"><i class="fas fa-layer-group me-2"></i>My Batches</a>
    <a href="training_sessions.html"><i class="fas fa-layer-group me-2"></i>Create Session</a>
    <a href="practical_project.html"><i class="fas fa-laptop-code"></i> Practicals & Projects</a>
    <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
    <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
    <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- SELECT -->
<div class="card">
    <label class="fw-bold mb-2">Select Batch</label>
    <select id="batchSelect" class="form-control"></select>
</div>

<!-- STATS -->
<div class="stats">
    <div class="stat-card card-total">
        TOTAL<br><h2 id="totalCard">0</h2>
    </div>
    <div class="stat-card card-completed">
        COMPLETED<br><h2 id="completedCard">0</h2>
    </div>
    <div class="stat-card card-remaining">
        REMAINING<br><h2 id="remainingCard">0</h2>
    </div>
</div>

<!-- PROGRESS -->
<div class="middle">

    <div class="card d-flex justify-content-center align-items-center">
        <div class="circle-box">
            <svg width="130" height="130">
                <circle cx="65" cy="65" r="55" stroke="#222" stroke-width="10" fill="none"/>
                <circle id="progressCircle" cx="65" cy="65" r="55"
                        stroke="#7c4dff" stroke-width="10" fill="none"/>
            </svg>
            <div id="progressPercent" class="circle-text">0%</div>
        </div>
    </div>

    <div class="card d-flex flex-column justify-content-center">
        <div class="progress mb-2">
            <div id="progressBar" class="progress-bar"></div>
        </div>

        <div id="progressText" class="fw-bold">0%</div>
        <div id="motivationText" class="text-success"></div>
    </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

    <div class="card">
        <input type="hidden" id="batchId">

        <input id="totalDays" class="form-control mb-2" readonly>
        <input id="completedDays" type="number" class="form-control mb-2">

        <button onclick="submitProgressSafe()" class="btn btn-purple w-100">
            Update Progress
        </button>
    </div>

    <div class="card text-center">
        <button id="beginner" class="milestone">Beginner</button>
        <button id="intermediate" class="milestone">Intermediate</button>
        <button id="advanced" class="milestone">Advanced</button>
    </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="script.js"></script>

</body>
</html>
