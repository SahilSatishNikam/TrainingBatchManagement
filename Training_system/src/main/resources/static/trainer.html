<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Trainers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

/* ===== SEARCH ===== */
.search{
  border-radius:20px;
  padding:8px 15px;
  border:1px solid var(--border);
  background:#0d0f14;
  color:white;
  transition:0.3s;
}

.search:focus{
  border-color:var(--purple);
  box-shadow:0 0 12px var(--purple-glow);
  transform:scale(1.03);
  outline:none;
}

/* ===== CARD ===== */
.card{
  background:linear-gradient(145deg,#1a1d26,#12141c);
  border-radius:16px;
  padding:20px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  transition:0.3s;
}

/* ===== TABLE ===== */
.clean-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 12px;
  color:var(--text);
}

/* HEADER */
.clean-table thead th{
  color:var(--muted);
  font-size:13px;
  text-transform:uppercase;
  padding:10px;
  border:none;
}

/* ROW CARD STYLE */
.clean-table tbody tr{
  background:var(--card-dark);
  transition:all 0.3s ease;
}

/* CELLS */
.clean-table td{
  padding:14px;
  border:none;
}

/* Rounded row edges */
.clean-table tbody tr td:first-child{
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

.clean-table tbody tr td:last-child{
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

/* HOVER EFFECT */
.clean-table tbody tr:hover{
  transform:translateY(-5px) scale(1.01);
  background:linear-gradient(135deg,#1f2330,#181c25);
  box-shadow:0 10px 25px rgba(0,0,0,0.7);
}

/* ===== TRAINER BOX ===== */
.trainer-box{
  display:flex;
  align-items:center;
  gap:10px;
}

.trainer-box img{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid var(--purple);
  transition:0.3s;
}

.clean-table tbody tr:hover .trainer-box img{
  transform:scale(1.1);
  box-shadow:0 0 12px var(--purple-glow);
}

.trainer-name{
  font-weight:bold;
}

.trainer-email{
  font-size:12px;
  color:var(--muted);
}

/* ===== STATUS ===== */
.status{
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
}

.status.active{
  background:rgba(46,213,115,0.15);
  color:#2ed573;
  box-shadow:0 0 8px rgba(46,213,115,0.4);
}

.status.inactive{
  background:rgba(255,71,87,0.15);
  color:#ff4757;
  box-shadow:0 0 8px rgba(255,71,87,0.4);
}

/* ===== ACTION BUTTONS ===== */
.action-btn button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  margin:2px;
  transition:all 0.3s ease;
}

.edit-btn{
  background:rgba(255,193,7,0.15);
  color:#ffc107;
}

.edit-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 12px rgba(255,193,7,0.6);
}

.delete-btn{
  background:rgba(255,71,87,0.15);
  color:#ff4757;
}

.delete-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 12px rgba(255,71,87,0.6);
}

/* ===== MODAL DARK ===== */
.modal-content{
  background:var(--card);
  color:var(--text);
  border-radius:12px;
}

.modal-header{
  border-bottom:1px solid var(--border);
}

.modal-footer{
  border-top:1px solid var(--border);
}

.form-control, .form-select{
  background:#0d0f14;
  border:1px solid var(--border);
  color:white;
}

.form-control:focus{
  border-color:var(--purple);
  box-shadow:0 0 10px var(--purple-glow);
}

/* ===== RESPONSIVE ===== */

/* Tablet */
@media(max-width:992px){
  .sidebar{
    transform:translateX(-100%);
    z-index:1000;
  }

  .sidebar.active{
    transform:translateX(0);
  }

  .main{
    margin-left:0;
  }
}

/* Mobile Table → Cards */
@media(max-width:768px){

  .clean-table thead{
    display:none;
  }

  .clean-table,
  .clean-table tbody,
  .clean-table tr,
  .clean-table td{
    display:block;
    width:100%;
  }

  .clean-table tr{
    margin-bottom:15px;
    background:var(--card);
    padding:12px;
    border-radius:12px;
  }

  .clean-table td{
    text-align:left;
    padding:8px;
    border:none;
  }

  .clean-table td::before{
    content:attr(data-label);
    font-weight:bold;
    display:block;
    color:var(--muted);
    font-size:12px;
  }

  .topbar{
    flex-direction:column;
    gap:10px;
    align-items:flex-start;
  }

  .search{
    width:100%;
  }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  background:#333;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Smart Admin</div>

  <a href="admin_dashboard.html">
        <i class="fas fa-home me-2"></i> Dashboard
    </a>

    <a href="add_trainer.html">
        <i class="fas fa-user-plus me-2"></i> Add Trainers
    </a>
 
    <a href="trainer.html" class="active">
        <i class="fas fa-users me-2"></i> Trainers
    </a>

    <a href="assign-batch.html">
        <i class="fas fa-box me-2"></i> Batches
    </a>

    <a href="batch-history.html">
        <i class="fas fa-history me-2"></i> History
    </a>

    <a href="#">
        <i class="fas fa-chart-line me-2"></i> Progress
    </a>

    <a href="notification.html">
        <i class="fas fa-bell me-2"></i> Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
  <h5 class="mb-0">All Trainers</h5>
  <input id="searchInput" class="search" placeholder="Search trainers...">
</div>

<!-- CARD -->
<div class="card">

<table class="table clean-table align-middle text-center">
<thead>
<tr>
  <th>No</th>
  <th>Trainer</th>
  <th>Department</th>
  <th>Mobile</th>
  <th>Joining</th>
  <th>Status</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="trainerTable"></tbody>

</table>

<!-- PAGINATION -->
<div id="pagination" class="mt-3 text-center"></div>

</div>

</div>

<!-- ✅ EDIT TRAINER MODAL -->
<div class="modal fade" id="editTrainerModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Trainer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editId">

        <div class="row g-3">

          <div class="col-md-6">
            <label>Name</label>
            <input id="editName" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Last Name</label>
            <input id="editLastName" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Email</label>
            <input id="editEmail" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Mobile</label>
            <input id="editMobile" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Department</label>
            <input id="editDept" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Joining Date</label>
            <input id="editDate" type="date" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Salary</label>
            <input id="editSalary" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Subject</label>
            <input id="editSubject" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Experience</label>
            <input id="editExperience" class="form-control">
          </div>

          <div class="col-md-6">
            <label>Status</label>
            <select id="editStatus" class="form-control">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>Gender</label>
            <select id="editGender" class="form-control">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>

          <div class="col-md-6">
            <label>Education</label>
            <input id="editEducation" class="form-control">
          </div>

          <div class="col-12">
            <label>Bio</label>
            <textarea id="editBio" class="form-control"></textarea>
          </div>

          <div class="col-12">
            <label>Photo</label>
            <input id="editPhoto" type="file" class="form-control">
          </div>

        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="updateTrainer()">Update</button>
      </div>

    </div>
  </div>
</div>

<script>
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
