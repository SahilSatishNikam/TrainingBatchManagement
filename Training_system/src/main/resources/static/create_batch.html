<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Batch</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#0b0b14;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text:#f5f5ff;
  --muted:#b8b8d1;
  --purple:#8b5cf6;
  --purple-light:#a78bfa;
  --glow: rgba(139,92,246,0.6);
}

body {
  margin:0;
  display:flex;
  color:var(--text);
  font-family:'Times New Roman', sans-serif;
  animation: fadeIn 0.8s ease;

  overflow-x:hidden;
}

 /* 🔥 BACKGROUND SLIDESHOW */
.bg-slider {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.bg-slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: slideShow 30s infinite;
}

/* DARK OVERLAY */
.bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(rgba(5,11,20,0.6), rgba(11,11,20,0.85));
  z-index: -1;
}

/* ANIMATION */
@keyframes slideShow {
  0% { opacity: 0; }
  5% { opacity: 1; }
  25% { opacity: 1; }
  30% { opacity: 0; }
  100% { opacity: 0; }
}
.bg-slide {
  animation: slideShow 30s infinite, zoomBg 30s infinite alternate;
}

@keyframes zoomBg {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* SIDEBAR */
.sidebar {
  width:240px;
  height:100vh;
  position:fixed;
  background:#0d0d14;
  border-right:1px solid var(--border);
}

.sidebar .brand {
  font-size:20px;
  padding:20px;
  font-weight:bold;
  color:var(--purple);
  text-align:center;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 5px #a855f7; }
  to { text-shadow:0 0 20px #a855f7; }
}

.sidebar a {
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover {
  background:rgba(168,85,247,0.1);
  color:#fff;
  transform:translateX(5px);
}

.sidebar a.active {
  background:rgba(168,85,247,0.2);
  border-left:3px solid var(--purple);
  color:#fff;
}

/* MAIN */
.main {
  margin-left:240px;
  width:100%;
  padding:25px;
}

/* TOPBAR */
.topbar {
  background:#111118;
  padding:15px 20px;
  border-radius:14px;
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid var(--border);
  animation: slideDown 0.6s ease;
}

/* CARD */
.card-box {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:30px;
  max-width:550px;
  margin:auto;
  backdrop-filter: blur(20px);
  animation:fadeUp 0.8s ease;
  transition:.4s;
}

.card-box:hover {
  box-shadow:0 0 30px var(--glow);
  transform:translateY(-5px);
}

/* LABEL */
label {
  color:#dcdcff;
  margin-bottom:6px;
  display:block;
  font-weight:500;
}

/* INPUT */
.form-control {
  background:#141426;
  border:1px solid rgba(255,255,255,0.15);
  color:#ffffff;
  border-radius:12px;
  padding:12px;
  transition:0.3s;
}

/* PLACEHOLDER */
.form-control::placeholder {
  color:#8888aa;
}

/* FOCUS */
.form-control:focus {
  background:#1c1c2e;
  border:1px solid var(--purple);
  box-shadow:0 0 10px var(--glow);
  color:#fff;
}

/* DATE FIX */
input[type="date"] {
  color-scheme: dark;
}
.date-wrapper {
  position: relative;
}

.calendar-icon {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: #a78bfa;
  pointer-events: none;
  font-size: 16px;
  text-shadow: 0 0 6px rgba(139,92,246,0.6);
}

/* BUTTON */
.btn-primary {
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  letter-spacing:0.5px;
  transition:.3s;
}

.btn-primary:hover {
  box-shadow:0 0 20px var(--glow);
  transform:scale(1.05);
}

/* PREVIEW BOX */
.preview-box {
  background:#141426;
  padding:18px;
  border-radius:14px;
  margin-top:15px;
  text-align:center;
  border:1px solid var(--border);
  color:#c4b5fd;
  transition:.3s;
}

.preview-box:hover {
  box-shadow:0 0 15px var(--glow);
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes fadeUp {
  from {
    transform:translateY(30px);
    opacity:0;
  }
  to {
    transform:translateY(0);
    opacity:1;
  }
}

@keyframes slideDown {
  from {
    transform:translateY(-40px);
    opacity:0;
  }
  to {
    transform:translateY(0);
    opacity:1;
  }
}

/* RESPONSIVE */
@media (max-width: 900px) {

  .sidebar {
    width:70px;
  }

  .sidebar .brand {
    font-size:14px;
  }

  .main {
    margin-left:70px;
  }
}

@media (max-width: 600px) {

  body {
    flex-direction:column;
  }

  .sidebar {
    width:100%;
    height:auto;
    display:flex;
    overflow-x:auto;
  }

  .sidebar a {
    flex:1;
    justify-content:center;
    font-size:12px;
  }

  .main {
    margin-left:0;
    padding:15px;
  }

  .card-box {
    padding:20px;
  }
}
</style>

<script>
(function(){
  let role = localStorage.getItem("role");
  if(role) role = role.replace("ROLE_","").toUpperCase();

  if(role !== "TRAINER"){
    alert("Access denied");
    window.location.href="login.html";

})();
</script>

</head>

<body>

</div>

<div class="bg-overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>

  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
  <h5>Create New Batch</h5>
  <span>Trainer Panel 🚀</span>
</div>

<!-- FORM -->
<div class="card-box mt-4">

  <h5 class="text-center mb-4">Create Batch</h5>

  <div class="mb-3">
    <label>Batch Name</label>
    <input id="batchName" class="form-control" placeholder="Enter batch name">
  </div>

  <div class="mb-3">
    <label>Start Date</label>
    <input type="date" id="startDate" class="form-control">
  </div>

  <div class="mb-3">
    <label>Total Days</label>
    <input type="number" id="totalDays" class="form-control" placeholder="Enter total days">
  </div>

  <div class="mb-3">
    <label>End Date (Auto)</label>
    <input type="date" id="endDate" class="form-control" readonly>
  </div>

  <!-- 🔥 Dynamic Preview -->
  <div class="preview-box">
    <div id="previewText">📅 Fill details to see preview</div>
  </div>

  <button class="btn btn-primary w-100 mt-3" onclick="createTrainerBatch()">
    Create Batch
  </button>

</div>

</div>

<script src="script.js"></script>

<!-- 🔥 DYNAMIC UI (NO BACKEND CHANGE) -->
<script>
function calculateEndDate() {
    const start = document.getElementById("startDate").value;
    const days = Number(document.getElementById("totalDays").value);

    if (!start || !days) return;

    const s = new Date(start);
    s.setDate(s.getDate() + days);

    const end = s.toISOString().split("T")[0];
    document.getElementById("endDate").value = end;

    document.getElementById("previewText").innerText =
        `📊 Duration: ${days} days | Ends on ${end}`;
}

document.getElementById("startDate").addEventListener("input", calculateEndDate);
document.getElementById("totalDays").addEventListener("input", calculateEndDate);
</script>

</body>
