<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --bg: #0b0b0f;
  --card: #111118;
  --border: rgba(255,255,255,0.06);
  --text: #ffffff;
  --muted: #9aa0a6;
  --purple: #a855f7;
  --purple-dark: #6d28d9;
}

/* ===== BODY ===== */
body {
  margin: 0;
  display: flex;
  background: radial-gradient(circle at top, #111122, #050508);
  font-family: "Times New Roman", serif;
  color: var(--text);
  animation: fadeIn 0.8s ease-in-out;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  background: #0d0d14;
  border-right: 1px solid var(--border);
}

.sidebar .brand {
  font-size: 20px;
  padding: 20px;
  font-weight: bold;
  color: var(--purple);
  text-align: center;
  animation: glow 2s infinite alternate;
}

.sidebar a {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  color: var(--muted);
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover {
  background: rgba(168,85,247,0.1);
  color: #fff;
  transform: translateX(5px);
}

.sidebar a.active {
  background: rgba(168,85,247,0.15);
  border-left: 3px solid var(--purple);
  color: #fff;
}

/* ===== MAIN ===== */
.main {
  margin-left: 240px;
  width: 100%;
  padding: 25px;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--card);
  padding: 15px 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  animation: slideDown 0.5s ease;
}

/* ===== CARD ===== */
.card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  animation: fadeUp 0.6s ease;
}

/* ===== NOTIFICATION ITEM ===== */
.notification-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid var(--purple);
  padding: 15px;
  margin-bottom: 12px;
  background: #141424;
  border-radius: 12px;
  transition: 0.3s;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.notification-item:hover {
  transform: translateX(8px) scale(1.02);
  background: rgba(168,85,247,0.15);
  box-shadow: 0 10px 25px rgba(168,85,247,0.25);
}

/* ===== TEXT ===== */
.notification-text {
  font-size: 15px;
}

.time {
  font-size: 12px;
  color: var(--muted);
}

/* ===== BUTTON ===== */
.btn-danger {
  background: linear-gradient(135deg,#ff4d4d,#ff1a1a);
  border: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn-danger:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(255,0,0,0.3);
}

/* ===== EMPTY MESSAGE ===== */
#emptyMsg {
  color: var(--muted);
  font-size: 14px;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes slideDown {
  from {opacity:0; transform: translateY(-20px);}
  to {opacity:1; transform: translateY(0);}
}

@keyframes glow {
  from { text-shadow: 0 0 5px #a855f7; }
  to { text-shadow: 0 0 20px #a855f7; }
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){

  .sidebar{
    width:200px;
  }

  .main{
    margin-left:0;
    padding:15px;
  }

  .topbar{
    flex-direction: column;
    gap:10px;
    align-items:flex-start;
  }

  .notification-item{
    flex-direction: column;
    align-items: flex-start;
    gap:5px;
  }
}

</style>

<script>
	// 🔒 Protect Page
	(function() {
		const role = localStorage.getItem("role");
		if (!role) {
			alert("Access denied");
			window.location.href = "login.html";
		}
	})();
</script>

</head>

<body>

	<!-- ===== SIDEBAR ===== -->
	<div class="sidebar">
		<div class="brand">🎓 Smart Trainer</div>

		<a href="admin_dashboard.html"> <i class="fas fa-home me-2"></i>Dashboard
		</a> <a href="create_batch.html"> <i class="fas fa-plus me-2"></i>Create
			Batch
		</a> <a href="trainer_batches.html"> <i
			class="fas fa-layer-group me-2"></i>My Batches
		</a> <a href="training_sessions.html"> <i
			class="fas fa-layer-group me-2"></i>Create Session
		</a> <a href="practical_project.html"> <i
			class="fas fa-laptop-code me-2"></i>Practicals & Projects
		</a> <a href="mock_interview.html"> <i class="fas fa-microphone me-2"></i>Mock
			Interviews
		</a><a href="admin_progress.html">
        <i class="fas fa-chart-line me-2"></i> Progress
    </a><a href="admin_notification.html" class="active"> <i
			class="fas fa-bell me-2"></i>Notifications
		</a> <a href="#" onclick="logout()"> <i
			class="fas fa-sign-out-alt me-2"></i>Logout
		</a>
	</div>

	<!-- ===== MAIN ===== -->
	<div class="main">

		<!-- TOPBAR -->
		<div class="topbar">
			<h5>🔔 Notifications</h5>
			<button class="btn btn-sm btn-danger" onclick="clearNotifications()">
				Clear All</button>
		</div>

		<!-- CARD -->
		<div class="card p-3">

			<div id="notificationList"></div>

			<!-- ✅ ADD THIS -->
			<div id="emptyMsg"
				style="display: none; text-align: center; margin-top: 10px;">
				No notifications</div>

		</div>

	</div>

	<script src="script.js"></script>

	<script
		src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

</body>
</html>
