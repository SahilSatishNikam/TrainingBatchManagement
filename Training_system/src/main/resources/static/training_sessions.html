<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Training Sessions</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#0b0b14;
  --card:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
  --text:#f5f5ff;
  --muted:#b8b8d1;
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --glow:rgba(139,92,246,0.6);
}

/* ================= BODY ================= */
body{
  margin:0;
  display:flex;
  background: radial-gradient(circle at top right,#1a1a2e,#0b0b14);
  color:var(--text);
  font-family:'Times New Roman', serif;
  animation:fadeIn 0.8s ease;
}

/* ================= SIDEBAR ================= */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:#0d0d14;
  border-right:1px solid var(--border);
}

.sidebar .brand{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:var(--purple);
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #a855f7; }
  to{ text-shadow:0 0 20px #a855f7; }
}

.sidebar a{
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:0.3s;
}

.sidebar a:hover{
  background:rgba(139,92,246,0.15);
  color:#fff;
  transform:translateX(6px);
}

.sidebar a.active{
  background:rgba(139,92,246,0.25);
  border-left:4px solid var(--purple);
  color:#fff;
  box-shadow:0 0 10px var(--glow);
}

/* ================= MAIN ================= */
.main{
  margin-left:240px;
  width:100%;
  padding:25px;
}

/* ================= TOPBAR ================= */
.topbar{
  background:var(--card);
  border:1px solid var(--border);
  padding:15px 20px;
  border-radius:14px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(10px);
  animation:slideDown 0.6s ease;
  transition:.3s;
}

.topbar:hover{
  box-shadow:0 0 20px var(--glow);
}

/* ================= CARD ================= */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  backdrop-filter:blur(12px);
  transition:0.3s;
  animation:fadeUp 0.6s ease;
}

.card:hover{
  box-shadow:0 0 25px var(--glow);
  transform:translateY(-5px);
}

/* ================= INPUT ================= */
.form-control{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:white;
  border-radius:10px;
  padding:10px;
  transition:.3s;
}

.form-control::placeholder{
  color:#aaa;
}

.form-control:focus{
  border-color:var(--purple);
  box-shadow:0 0 10px var(--glow);
  background:#1c1c2e;
}

/* DATE INPUT FIX */
input[type="date"]{
  color-scheme:dark;
}

input[type="date"]::-webkit-calendar-picker-indicator{
  filter:invert(1) brightness(2);
  cursor:pointer;
}

/* ================= BUTTON ================= */
.btn-primary{
  background:linear-gradient(135deg,#8b5cf6,#c4b5fd);
  border:none;
  border-radius:10px;
  font-weight:600;
  transition:.3s;
}

.btn-primary:hover{
  box-shadow:0 0 15px var(--glow);
  transform:scale(1.05);
}

/* TABLE CONTAINER */
.table {
  border-collapse: separate;
  border-spacing: 0 12px;
  font-family: "Times New Roman", serif;
}

/* HEADER */
.table thead th {
  background: linear-gradient(90deg, #8b5cf6, #6d28d9);
  color: #fff;
  border: none;
  padding: 14px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
}

/* ROW STYLE */
.table tbody tr {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  transition: all 0.3s ease;
}

/* ROUNDED CORNERS */
.table tbody tr td:first-child {
  border-top-left-radius: 12px;
  border-bottom-left-radius: 12px;
}
.table tbody tr td:last-child {
  border-top-right-radius: 12px;
  border-bottom-right-radius: 12px;
}

/* CELL */
.table td {
  padding: 14px;
  border: none;
  vertical-align: middle;
}

/* HOVER EFFECT */
.table tbody tr:hover {
  transform: translateY(-5px) scale(1.01);
  background: rgba(139,92,246,0.15);
  box-shadow: 0 10px 25px rgba(139,92,246,0.25);
}

/* STATUS BADGES */
.status {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}

.status.completed {
  background: rgba(34,197,94,0.2);
  color: #22c55e;
}

.status.pending {
  background: rgba(234,179,8,0.2);
  color: #eab308;
}

.status.cancelled {
  background: rgba(239,68,68,0.2);
  color: #ef4444;
}

/* ACTION BUTTON */
.btn-action {
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  background: linear-gradient(135deg,#8b5cf6,#6d28d9);
  color: white;
  transition: 0.3s;
}

.btn-action:hover {
  box-shadow: 0 0 10px rgba(139,92,246,0.6);
  transform: scale(1.05);
}

/* FADE ANIMATION */
.table tbody tr {
  animation: fadeUp 0.4s ease;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes slideDown{
  from{opacity:0; transform:translateY(-30px);}
  to{opacity:1; transform:translateY(0);}
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .sidebar{width:70px;}
  .main{margin-left:70px;}
  .sidebar .brand{font-size:14px;}
}

@media(max-width:600px){

  body{flex-direction:column;}

  .sidebar{
    width:100%;
    height:auto;
    display:flex;
    overflow-x:auto;
  }

  .sidebar a{
    flex:1;
    justify-content:center;
    font-size:12px;
  }

  .main{
    margin-left:0;
    padding:15px;
  }

  /* MOBILE TABLE */
  .custom-table thead{display:none;}

  .custom-table tbody tr{
    display:block;
    margin-bottom:15px;
    padding:10px;
  }

  .custom-table td{
    display:flex;
    justify-content:space-between;
    font-size:12px;
  }

  .custom-table td::before{
    content:attr(data-label);
    font-weight:bold;
    color:var(--purple2);
  }
}
.h5, h5 {
    font-size: 1.25rem;
    color:White;
}
/* DROPDOWN FIX */
select.form-control {
  background: rgba(255,255,255,0.05);
  color: white;
  border: 1px solid var(--border);
  border-radius: 10px;
}

/* VERY IMPORTANT: OPTIONS */
select.form-control option {
  background: #0b0b14;   /* dark background */
  color: white;          /* visible text */
}

/* On focus */
select.form-control:focus {
  background: rgba(255,255,255,0.08);
  color: white;
  border-color: var(--purple);
  box-shadow: 0 0 10px var(--purple-glow);
}
input[type="date"] {
    color-scheme: white;
}
</style>

<script>
(function(){
  const role = localStorage.getItem("role");
  if(!role || role !== "TRAINER"){
    alert("Access denied");
    window.location.href="login.html";
  }
})();
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html">
    <i class="fas fa-home me-2"></i>Dashboard
  </a>

  <a href="create_batch.html">
    <i class="fas fa-plus me-2"></i>Create Batch
  </a>

  <a href="trainer_batches.html">
    <i class="fas fa-layer-group me-2"></i>My Batches
  </a>

  <a href="training_sessions.html" class="active">
    <i class="fas fa-book me-2"></i>Training Sessions
  </a>

  <a href="practical_project.html">
    <i class="fas fa-laptop-code me-2"></i>Practicals
  </a>

  <a href="mock_interview.html">
    <i class="fas fa-microphone me-2"></i>Mock Interviews
  </a>

  <a href="update_progress.html">
    <i class="fas fa-chart-line me-2"></i>Progress
  </a>

  <a href="trainer_notification.html">
    <i class="fas fa-bell me-2"></i>Notifications
  </a>

  <a href="#" onclick="logout()">
    <i class="fas fa-sign-out-alt me-2"></i>Logout
  </a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h5>📚 Training Sessions</h5>
    <button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
  </div>

  <!-- CREATE SESSION -->
  <div class="card p-4 mb-4 fadeUp">

    <h5 class="mb-3">➕ Add New Session</h5>

    <div class="row g-3">

      <!-- Batch -->
      <div class="col-md-3">
        <label class="small text-muted">Batch</label>
        <select id="batchSelect" class="form-control" onchange="onBatchSelectChange()">
          <option value="">Select Batch</option>
        </select>
      </div>

      <!-- Topic -->
      <div class="col-md-3">
        <label class="small text-muted">Topic</label>
        <input id="topic" class="form-control" placeholder="Enter topic">
      </div>

      <!-- Date -->
      <div class="col-md-3">
        <label class="small text-muted">Date</label>
        <input type="date" id="sessionDate" class="form-control">
      </div>

      <!-- Button -->
      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="createSession()">
          <i class="fas fa-plus me-2"></i>Add Session
        </button>
      </div>

    </div>
  </div>

  <table class="table text-center align-middle">
  <thead>
    <tr>
      <th>Topic</th>
      <th>Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="sessionTable">
    <!-- Dynamic rows will be added here -->
  </tbody>
</table>

</div>

<script>
function logout(){
  localStorage.clear();
  window.location.href="login.html";
}
</script>

<script src="script.js"></script>

</body>
</html>
