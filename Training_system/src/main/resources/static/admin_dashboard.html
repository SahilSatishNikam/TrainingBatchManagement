<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
/* ===== VARIABLES ===== */
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}
/* CIRCLE STATS */
.stats {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.circle-card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.circle-card:hover {
    transform:translateY(-5px);
    box-shadow:0 0 20px rgba(168,85,247,0.3);
}

.circle {
    width:100px;
    height:100px;
    margin:auto;
    position:relative;
}

.circle svg {
    transform:rotate(-90deg);
}

.circle circle {
    fill:none;
    stroke-width:8;
    stroke:#222;
}

.circle .progress {
    stroke:var(--purple);
    stroke-dasharray:314;
    stroke-dashoffset:314;
    transition:1s ease;
}

.circle-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:20px;
    font-weight:bold;
}

/* TABLE */
.table-box{
    margin-top:30px;
    background:dark;
    border-radius:16px;
    padding:20px;
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
}

table{
    width:100%;
    border-spacing:0 10px;
}

thead th{
    color:#aaa;
    font-size:13px;
    text-transform:uppercase;
}

tbody tr{
    background:#0f0f18;
    transition:0.3s;
}

tbody tr:hover{
    transform:translateY(-5px);
    box-shadow:0 0 15px rgba(168,85,247,0.3);
    background:linear-gradient(135deg,#111122,#0a0a12);
}

td{
    padding:14px;
}


.progress-bar {
    background:linear-gradient(90deg,#a855f7,#7e22ce);
}

/* NOTIFICATION */
#notificationList {
    display:none;
    position:absolute;
    top:30px;
    right:0;
    background:#111;
    padding:10px;
    border-radius:10px;
    width:250px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="brand">Smart Admin</div>

    <a href="admin_dashboard.html" class="active"><i class="fas fa-home me-2"></i>Dashboard</a>
    <a href="add_trainer.html"><i class="fas fa-user-plus me-2"></i>Add Trainers</a>
    <a href="trainer.html"><i class="fas fa-users me-2"></i>Trainers</a>
    <a href="assign-batch.html"><i class="fas fa-box me-2"></i>Batches</a>
    <a href="batch-history.html"><i class="fas fa-history me-2"></i>History</a>
    <a href="admin_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
    <a href="admin_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
    <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
    <h5>Welcome Admin 👋</h5>

    <div style="position:relative">
        <i class="fas fa-bell" onclick="toggleNotifications()"></i>
        <span id="notifCount" class="badge bg-danger">0</span>

        <div id="notificationList">
            <div>No notifications</div>
        </div>
    </div>
</div>

<!-- CIRCLE STATS -->
<div class="stats mb-4">

    <div class="circle-card">
        <div class="circle">
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="50"></circle>
                <circle id="circleTotal" class="progress" cx="50" cy="50" r="50"></circle>
            </svg>
            <div class="circle-text" id="trainers">0</div>
        </div>
        <p>Total Trainers</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="50"></circle>
                <circle id="circleBatch" class="progress" cx="50" cy="50" r="50"></circle>
            </svg>
            <div class="circle-text" id="batches">0</div>
        </div>
        <p>Total Batches</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="50"></circle>
                <circle id="circleActive" class="progress" cx="50" cy="50" r="50"></circle>
            </svg>
            <div class="circle-text" id="active">0</div>
        </div>
        <p>Ongoing</p>
    </div>

    <div class="circle-card">
        <div class="circle">
            <svg width="100" height="100">
                <circle cx="50" cy="50" r="50"></circle>
                <circle id="circleCompleted" class="progress" cx="50" cy="50" r="50"></circle>
            </svg>
            <div class="circle-text" id="completed">0</div>
        </div>
        <p>Completed</p>
    </div>

</div>

<!-- TABLE -->
<div class="card p-3">
    <h5>Ongoing Batches</h5>

    <table class="table text-center">
        <thead>
            <tr>
                <th>ID</th>
                <th>Batch</th>
                <th>Trainer</th>
                <th>Dates</th>
                <th>Progress</th>
            </tr>
        </thead>
        <tbody id="dashboardBatchTable"></tbody>
    </table>
</div>

</div>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

function toggleNotifications() {
    const box = document.getElementById("notificationList");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* 🔥 CIRCLE ANIMATION (AUTO BASED ON VALUE) */
function animateCircle(id, value, max = 100) {
    const circle = document.getElementById(id);
    const radius = 50;
    const circumference = 2 * Math.PI * radius;

    circle.style.strokeDasharray = circumference;

    let percent = (value / max) * 100;
    const offset = circumference - (percent / 100) * circumference;

    setTimeout(() => {
        circle.style.strokeDashoffset = offset;
    }, 300);
}

/* 🔥 AUTO RUN AFTER DATA LOAD */
setTimeout(() => {
    animateCircle("circleTotal", document.getElementById("trainers").innerText, 50);
    animateCircle("circleBatch", document.getElementById("batches").innerText, 50);
    animateCircle("circleActive", document.getElementById("active").innerText, 50);
    animateCircle("circleCompleted", document.getElementById("completed").innerText, 50);
}, 1500);
</script>

<script src="script.js"></script>

</body>
</html>
