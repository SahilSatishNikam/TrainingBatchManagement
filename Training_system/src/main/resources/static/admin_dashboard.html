<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

/* CARDS */
.card-box {
    padding: 20px;
    border-radius: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: 0.4s;
    cursor: pointer;
}

/* Neon border animation */
.card-box::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    padding: 1px;
    background: linear-gradient(120deg, transparent, #a855f7, transparent);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    opacity: 0;
    transition: 0.4s;
}

.card-box:hover::after {
    opacity: 1;
}

.card-box:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 30px rgba(168,85,247,0.3);
}

/* Floating animation */
.card-box:hover h3 {
    animation: float 1s ease-in-out infinite alternate;
}

@keyframes float {
    from {transform: translateY(0);}
    to {transform: translateY(-5px);}
}

.card-box p {
    color: white;
}

/* GLOW BG */
.card-box::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(168,85,247,0.15), transparent);
    top: -60%;
    left: -60%;
}

/* TABLE CONTAINER */
.card {
    background: rgba(17, 17, 24, 0.8) !important;
    border-radius: 16px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}

/* TABLE */
.table {
    border-collapse: separate;
    border-spacing: 0 10px;
}

/* HEADER */
.table thead th {
    color: var(--muted);
    font-weight: 500;
    border: none;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* ROW STYLE */
.table tbody tr {
    background: #0f0f18;
    border-radius: 12px;
    transition: 0.3s;
    box-shadow: 0 0 0 transparent;
}

/* Make rows rounded */
.table tbody tr td:first-child {
    border-top-left-radius: 12px;
    border-bottom-left-radius: 12px;
}
.table tbody tr td:last-child {
    border-top-right-radius: 12px;
    border-bottom-right-radius: 12px;
}

/* CELL */
.table td {
    vertical-align: middle;
    border: none;
    padding: 15px;
}

/* HOVER EFFECT */
.table tbody tr:hover {
    transform: translateY(-5px) scale(1.01);
    background: linear-gradient(135deg, #111122, #0a0a12);
    box-shadow: 0 0 20px rgba(168,85,247,0.25);
}

/* PROGRESS BAR */
.progress {
    height: 8px;
    background: #1a1a22;
    border-radius: 10px;
    overflow: hidden;
}

.progress-bar {
    background: linear-gradient(90deg, #a855f7, #7e22ce);
    box-shadow: 0 0 10px #a855f7;
}

/* STATUS BADGE */
.status-badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
}

.status-active {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
}

.status-completed {
    background: rgba(59,130,246,0.15);
    color: #3b82f6;
}

/* ROW ICON */
.table i {
    color: #a855f7;
}

/* BUTTON */
.btn-primary {
    background: linear-gradient(135deg, #9333ea, #7e22ce);
    border: none;
    border-radius: 20px;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #a855f7;
}

/* NOTIFICATION BELL */
.fa-bell {
    transition: 0.3s;
}

.fa-bell:hover {
    transform: rotate(15deg) scale(1.2);
    color: #a855f7;
}

/* BADGE PULSE */
.badge {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* SCROLL */
::-webkit-scrollbar {
    width: 6px;
}
::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
}
</style>

<script>
function animateValue(id, start, end, duration) {
    let obj = document.getElementById(id);
    let range = end - start;
    let current = start;
    let increment = end > start ? 1 : -1;
    let stepTime = Math.abs(Math.floor(duration / range));

    let timer = setInterval(() => {
        current += increment;
        obj.innerText = current;
        if (current == end) clearInterval(timer);
    }, stepTime);
}

// Run animation
window.onload = () => {
    animateValue("trainers", 0, 120, 1000);
    animateValue("batches", 0, 45, 1000);
    animateValue("active", 0, 18, 1000);
    animateValue("completed", 0, 27, 1000);
};
(function () {
    const role = localStorage.getItem("role");
    if (!role || role !== "ADMIN") {
        alert("Access denied");
        window.location.href = "login.html";
    }
})();
</script>

</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="brand">Smart Admin</div>

    <a href="admin_dashboard.html" class="active">
        <i class="fas fa-home me-2"></i> Dashboard
    </a>

    <a href="add_trainer.html">
        <i class="fas fa-user-plus me-2"></i> Add Trainers
    </a>

    <a href="trainer.html">
        <i class="fas fa-users me-2"></i> Trainers
    </a>

    <a href="assign-batch.html">
        <i class="fas fa-box me-2"></i> Batches
    </a>

    <a href="batch-history.html">
        <i class="fas fa-history me-2"></i> History
    </a>

    <a href="#">
        <i class="fas fa-chart-line me-2"></i> Progress
    </a>

    <a href="notification.html">
        <i class="fas fa-bell me-2"></i> Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
    </a>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

    <!-- ===== TOPBAR ===== -->
    <div class="topbar">
        <h5 class="mb-0">Welcome Admin 👋</h5>

        <div class="d-flex align-items-center gap-3">

            <!-- 🔔 Notification Bell -->
            <div style="position:relative; cursor:pointer;" onclick="toggleNotifications()">
                <i class="fas fa-bell fa-lg"></i>
                <span id="notifCount" class="badge bg-danger"
                      style="position:absolute; top:-5px; right:-10px;">0</span>

                <!-- Dropdown -->
                <div id="notificationList">
                    <div class="notification-box" id="notificationBox">
                        <div class="text-center text-muted">No notifications</div>
                    </div>
                </div>
            </div>

            <button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- ===== CARDS ===== -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card-box bg1">
                <h3 id="trainers">0</h3>
                <p>Total Trainers</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg2">
                <h3 id="batches">0</h3>
                <p>Total Batches</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg3">
                <h3 id="active">0</h3>
                <p>Ongoing</p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box bg4">
                <h3 id="completed">0</h3>
                <p>Completed</p>
            </div>
        </div>
    </div>

    <!-- ===== TABLE ===== -->
    <div class="card p-3">
        <h5 class="mb-3 section-title">Ongoing Batches</h5>

        <table class="table table-hover text-center">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Batch</th>
                    <th>Trainer</th>
                    <th>Dates</th>
                    <th>Progress</th>
                </tr>
            </thead>
            <tbody id="dashboardBatchTable"></tbody>
        </table>
    </div>

</div>

<!-- ✅ REQUIRED SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

// 🔔 Toggle Notification Dropdown
function toggleNotifications() {
    const box = document.getElementById("notificationList");
    box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

<script src="script.js"></script>

</body>
</html>
