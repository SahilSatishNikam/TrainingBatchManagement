<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mock Interviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root{
    --purple:#7c4dff;
    --dark:#0f0f1a;
    --card:#1a1a2e;
    --text:#ffffff;
}

/* BODY */
body{
    margin:0;
    display:flex;
    background:var(--dark);
    color:var(--text);
    font-family:'Poppins',sans-serif;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#111326,#0b0b14);
  border-right:1px solid var(--border);
}

.sidebar .brand{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background: linear-gradient(45deg,#8b5cf6,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sidebar a{
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover,
.sidebar a.active{
  background:rgba(139,92,246,0.15);
  color:#fff;
  border-left:4px solid var(--purple);
  box-shadow:0 0 10px var(--glow);
}

/* MAIN */
.main{
    margin-left:240px;
    width:100%;
    padding:20px;
}

/* TOPBAR */
.topbar{
    background:var(--card);
    padding:15px 20px;
    border-radius:12px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 15px rgba(124,77,255,0.3);
}

/* CARD */
.card{
    background:var(--card);
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 20px rgba(124,77,255,0.15);
}

/* INPUTS */
.form-control{
    background:#111;
    border:1px solid #444;
    color:#fff;
}
.form-control::placeholder{
    color:#aaa;
}
.form-control:focus{
    background:#111;
    color:#fff;
    border-color:var(--purple);
    box-shadow:0 0 5px var(--purple);
}

/* BUTTONS */
.btn-purple{
    background:linear-gradient(135deg,#7c4dff,#651fff);
    border:none;
    color:#fff;
}
.btn-purple:hover{
    transform:scale(1.05);
}

/* TABLE */
.table{
    border-radius:10px;
    overflow:hidden;
}
.table thead{
    background:linear-gradient(135deg,#7c4dff,#651fff);
    color:#fff;
}
.table tbody tr{
    background:#111;
    transition:0.3s;
}
.table tbody tr:hover{
    background:#1f1f2e;
}

/* BADGE */
.badge{
    padding:6px 10px;
    border-radius:10px;
}

/* ACTION BUTTONS */
.action-btn{
    border:none;
    padding:6px 10px;
    border-radius:8px;
    color:#fff;
    margin:2px;
}
.complete-btn{
    background:linear-gradient(135deg,#00c853,#00e676);
}
.delete-btn{
    background:linear-gradient(135deg,#ff1744,#d50000);
}
</style>

<script>
(function(){
    let role = localStorage.getItem("role");
    if (role) role = role.replace("ROLE_","").toUpperCase();

    if(!role || role !== "TRAINER"){
        alert("Access denied");
        window.location.href="login.html";
    }
})();
</script>

</head>

<body>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar">
    <div class="brand">🎓 Smart Trainer</div>

    <a href="trainer_dashboard.html">
        <i class="fas fa-home me-2"></i>Dashboard
    </a>

    <a href="create_batch.html">
        <i class="fas fa-plus me-2"></i>Create Batch
    </a>

    <a href="trainer_batches.html">
        <i class="fas fa-layer-group me-2"></i>My Batches
    </a>

    <a href="training_sessions.html">
        <i class="fas fa-layer-group me-2"></i>Create Session
    </a>

    <a href="practical_project.html">
        <i class="fas fa-laptop-code me-2"></i>Practicals & Projects
    </a>

    <a href="mock_interview.html" class="active">
        <i class="fas fa-microphone me-2"></i>Mock Interviews
    </a>

    <a href="update_progress.html">
        <i class="fas fa-chart-line me-2"></i>Progress
    </a>

    <a href="trainer_notification.html">
        <i class="fas fa-bell me-2"></i>Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
    </a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h5>🎤 Mock Interviews</h5>
        <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>

    <div class="card">

        <!-- FORM -->
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <select id="mockBatch" class="form-control"></select>
            </div>

            <div class="col-md-3">
                <input id="interviewer" class="form-control"
                       placeholder="Enter Interviewer Name">
            </div>

            <div class="col-md-3">
                <input type="date" id="date" class="form-control">
            </div>

            <div class="col-md-3">
                <button class="btn btn-purple w-100" onclick="createMock()">
                    Schedule Interview
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <table class="table text-center align-middle">
            <thead>
                <tr>
                    <th>Interviewer</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Score</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="mockTable"></tbody>
        </table>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="mockModal">
  <div class="modal-dialog">
    <div class="modal-content" style="background:#1a1a2e;color:#fff;">

      <div class="modal-header border-0">
        <h5 class="modal-title">Complete Interview</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="mockId">

        <label>Score</label>
        <input type="number" id="mockScore"
               class="form-control mb-3"
               placeholder="Enter Score">

        <label>Feedback</label>
        <textarea id="mockFeedback"
                  class="form-control"
                  placeholder="Enter feedback"></textarea>

      </div>

      <div class="modal-footer border-0">
        <button class="btn btn-purple" onclick="completeMock()">
          Submit
        </button>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
