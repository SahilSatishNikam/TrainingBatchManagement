<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mock Interviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
/* ===== VARIABLES ===== */
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
    background: #111118;
    padding: 15px 20px;
    border-radius: 14px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
}


/* ===== CARD ===== */
.card{
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
    backdrop-filter:blur(15px);
    transition:.4s;
    animation:fadeUp 0.6s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 30px var(--glow);
}

/* ===== INPUT ===== */
.form-control{
    background:rgba(255,255,255,0.07) !important;
    border:1px solid var(--border) !important;
    color:#fff !important;
    border-radius:10px;
    padding:10px;
    transition:.3s;
}

.form-control::placeholder{
    color:#cfcfe8;
}

.form-control:focus{
    border-color:var(--purple) !important;
    box-shadow:0 0 10px var(--glow);
    background:#1c1c2e !important;
}

/* ===== BUTTON ===== */
.btn-purple{
    background:linear-gradient(135deg,#8b5cf6,#c4b5fd);
    border:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.btn-purple:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px var(--glow);
}

/* ===== TABLE ===== */
.table{
    border-collapse:separate;
    border-spacing:0 12px;
}

/* HEADER */
.table thead th{
    background:linear-gradient(90deg,#8b5cf6,#6d28d9);
    border:none;
    color:#fff;
    padding:14px;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:1px;
}

/* ROW */
.table tbody tr{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    transition:.4s;
}

/* HOVER */
.table tbody tr:hover{
    transform:translateY(-5px) scale(1.01);
    background:rgba(139,92,246,0.15);
    box-shadow:0 10px 25px rgba(139,92,246,0.3);
}

/* CELLS */
.table td{
    border:none;
    padding:14px;
}

/* ROUND EFFECT */
.table tbody tr td:first-child{
    border-top-left-radius:12px;
    border-bottom-left-radius:12px;
}
.table tbody tr td:last-child{
    border-top-right-radius:12px;
    border-bottom-right-radius:12px;
}

/* ===== ACTION BUTTONS ===== */
.action-btn{
    border:none;
    padding:6px 10px;
    border-radius:8px;
    color:#fff;
    margin:2px;
    transition:.3s;
}

.complete-btn{
    background:linear-gradient(135deg,#00c853,#00e676);
}

.delete-btn{
    background:linear-gradient(135deg,#ff1744,#d50000);
}

.action-btn:hover{
    transform:scale(1.1);
}

/* ===== MODAL ===== */
.modal-content{
    background:rgba(20,20,40,0.95);
    backdrop-filter:blur(20px);
    border-radius:16px;
    border:1px solid var(--border);
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes slideDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

/* ===== RESPONSIVE ===== */
@media(max-width:992px){
    .sidebar{
        width:70px;
    }
    .main{
        margin-left:70px;
    }
}

@media(max-width:768px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        display:flex;
        overflow-x:auto;
    }

    .sidebar a{
        flex:1;
        justify-content:center;
        font-size:12px;
    }

    .main{
        margin-left:0;
        padding:15px;
    }

    .row > div{
        margin-bottom:10px;
    }

    /* MOBILE TABLE */
    .table thead{
        display:none;
    }

    .table tbody tr{
        display:block;
        margin-bottom:15px;
        padding:10px;
    }

    .table td{
        display:flex;
        justify-content:space-between;
        font-size:12px;
    }

    .table td::before{
        content:attr(data-label);
        font-weight:bold;
        color:var(--purple2);
    }
}
/* ================= BUTTON ================= */
.btn-primary{
  background:linear-gradient(135deg,#8b5cf6,#c4b5fd);
  border:none;
  border-radius:10px;
  font-weight:600;
  transition:.3s;
}

.btn-primary:hover{
  box-shadow:0 0 15px var(--glow);
  transform:scale(1.05);
}

</style>

<script>
(function(){
    let role = localStorage.getItem("role");
    if (role) role = role.replace("ROLE_","").toUpperCase();

    if(!role || role !== "TRAINER"){
        alert("Access denied");
        window.location.href="login.html";
    }
})();
</script>

</head>

<body>

<!-- SIDEBAR (UNCHANGED) -->
<div class="sidebar">
    <div class="brand">🎓 Smart Trainer</div>

    <a href="trainer_dashboard.html">
        <i class="fas fa-home me-2"></i>Dashboard
    </a>

    <a href="create_batch.html">
        <i class="fas fa-plus me-2"></i>Create Batch
    </a>

    <a href="trainer_batches.html">
        <i class="fas fa-layer-group me-2"></i>My Batches
    </a>

    <a href="training_sessions.html">
        <i class="fas fa-layer-group me-2"></i>Create Session
    </a>

    <a href="practical_project.html">
        <i class="fas fa-laptop-code me-2"></i>Practicals & Projects
    </a>

    <a href="mock_interview.html" class="active">
        <i class="fas fa-microphone me-2"></i>Mock Interviews
    </a>

    <a href="update_progress.html">
        <i class="fas fa-chart-line me-2"></i>Progress
    </a>

    <a href="trainer_notification.html">
        <i class="fas fa-bell me-2"></i>Notifications
    </a>

    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
    </a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h5>🎤 Mock Interviews</h5>
        <button class="btn btn-primary btn-sm" onclick="logout()">Logout</button>
    </div>

    <div class="card">

        <!-- FORM -->
        <div class="row mb-4 g-3">
            <div class="col-md-3">
                <select id="mockBatch" class="form-control"></select>
            </div>

            <div class="col-md-3">
                <input id="interviewer" class="form-control"
                       placeholder="Enter Interviewer Name">
            </div>

            <div class="col-md-3">
                <input type="date" id="date" class="form-control">
            </div>

            <div class="col-md-3">
                <button class="btn btn-purple w-100" onclick="createMock()">
                    Schedule Interview
                </button>
            </div>
        </div>

        <!-- TABLE -->
        <table class="table text-center align-middle">
            <thead>
                <tr>
                    <th>Interviewer</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Score</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="mockTable"></tbody>
        </table>

    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="mockModal">
  <div class="modal-dialog">
    <div class="modal-content" style="background:#1a1a2e;color:#fff;">

      <div class="modal-header border-0">
        <h5 class="modal-title">Complete Interview</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="mockId">

        <label>Score</label>
        <input type="number" id="mockScore"
               class="form-control mb-3"
               placeholder="Enter Score">

        <label>Feedback</label>
        <textarea id="mockFeedback"
                  class="form-control"
                  placeholder="Enter feedback"></textarea>

      </div>

      <div class="modal-footer border-0">
        <button class="btn btn-purple" onclick="completeMock()">
          Submit
        </button>
      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
