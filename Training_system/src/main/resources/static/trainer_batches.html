<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Batches</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#0b0b14;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text:#f5f5ff;
  --muted:#b8b8d1;
  --purple:#8b5cf6;
}

body {
  margin:0;
  display:flex;
  background: radial-gradient(circle at top right,#1a1a2e,#0b0b14);
  color:var(--text);
  font-family:'Segoe UI',sans-serif;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:linear-gradient(180deg,#111326,#0b0b14);
  border-right:1px solid var(--border);
}

.sidebar .brand{
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background: linear-gradient(45deg,#8b5cf6,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sidebar a{
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover,
.sidebar a.active{
  background:rgba(139,92,246,0.15);
  color:#fff;
  border-left:4px solid var(--purple);
  box-shadow:0 0 10px var(--glow);
}

/* MAIN */
.main {
  margin-left:240px;
  padding:25px;
  width:100%;
}

/* TOP */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

/* SEARCH */
.search-box {
  background:#1c1c2b;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  color:white;
}

/* TABLE CARD */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px;
}

/* PROGRESS */
.progress {
  height:8px;
  background:#1c1c2b;
}

.progress-bar {
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html">Dashboard</a>
  <a href="create_batch.html">Create Batch</a>
  <a href="trainer_batches.html" class="active">My Batches</a>
  <a href="training_sessions.html">Sessions</a>
  <a href="practical_project.html">Practicals</a>
  <a href="mock_interview.html">Mock Interviews</a>
  <a href="update_progress.html">
    <i class="fas fa-chart-line me-2"></i>Update Progress
  </a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="topbar">
  <h4>📊 My Batches</h4>

  <input type="text" id="searchInput" class="search-box" placeholder="Search batch...">
</div>

<!-- TABLE -->
<div class="card">

<table class="table text-center text-light">

<thead>
<tr>
  <th>Batch</th>
  <th>Dates</th>
  <th>Total Days</th>
  <th>Completed</th>
  <th>Progress</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="batchTable"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("input", function () {
  let filter = this.value.toLowerCase();
  document.querySelectorAll("#batchTable tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
