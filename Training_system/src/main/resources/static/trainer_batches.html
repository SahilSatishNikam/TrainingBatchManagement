<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Batches</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg:#0b0b14;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text:#f5f5ff;
  --muted:#b8b8d1;
  --purple:#8b5cf6;
  --purple2:#a78bfa;
  --glow: rgba(139,92,246,0.6);
}

/* ================= BODY ================= */
body {
  margin:0;
  display:flex;
  background: radial-gradient(circle at top right,#1a1a2e,#0b0b14);
  color:var(--text);
  font-family:'Times New Roman', serif;
  animation: fadeIn 0.8s ease;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width:240px;
  height:100vh;
  position:fixed;
  background:#0d0d14;
  border-right:1px solid var(--border);
}

.sidebar .brand {
  font-size:20px;
  padding:20px;
  font-weight:bold;
  color:var(--purple);
  text-align:center;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 5px #a855f7; }
  to { text-shadow:0 0 20px #a855f7; }
}

.sidebar a {
  display:flex;
  align-items:center;
  padding:14px 20px;
  color:var(--muted);
  text-decoration:none;
  transition:.3s;
}

.sidebar a:hover {
  background:rgba(168,85,247,0.15);
  color:#fff;
  transform:translateX(6px);
}

.sidebar a.active {
  background:rgba(168,85,247,0.25);
  border-left:4px solid var(--purple);
  color:#fff;
  box-shadow:0 0 10px var(--glow);
}

/* ================= MAIN ================= */
.main {
  margin-left:240px;
  width:100%;
  padding:25px;
}

/* ================= TOPBAR ================= */
.topbar {
  background:var(--card);
  border:1px solid var(--border);
  padding:15px 20px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation: slideDown 0.6s ease;
  transition:.3s;
}

.topbar:hover {
  box-shadow:0 0 20px var(--glow);
}

/* SEARCH */
.search-box {
  background:#1c1c2b;
  border:1px solid var(--border);
  padding:10px 15px;
  border-radius:10px;
  color:white;
  transition:0.3s;
}

.search-box:focus {
  outline:none;
  box-shadow:0 0 10px var(--glow);
}

/* CARD */
.card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:15px;
  padding:15px;
  backdrop-filter: blur(12px);
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  animation: slideUp 0.6s ease;
}

/* TABLE BASE */
.custom-table {
  border-collapse:separate;
  border-spacing:0 12px;
  min-width:700px;
}

/* HEADER */
.custom-table thead th {
  font-weight:600;
  color:#c4b5fd;
  border:none !important;
  padding:12px 16px;
  text-transform:uppercase;
  font-size:13px;
  letter-spacing:1px;
}

/* ROW STYLE */
.custom-table tbody tr {
  background:rgba(255,255,255,0.04);
  backdrop-filter: blur(10px);
  border-radius:12px;
  transition:0.3s ease;
}

.custom-table tbody tr:hover {
  transform:translateY(-3px);
  background:rgba(139,92,246,0.12);
  box-shadow:0 0 18px rgba(139,92,246,0.4);
}

/* CELLS */
.custom-table td {
  border:none !important;
  padding:16px;
  vertical-align:middle;
}

/* ROUNDED ROW EFFECT */
.custom-table tbody tr td:first-child {
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}

.custom-table tbody tr td:last-child {
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

/* PROGRESS WRAPPER (for dynamic use) */
.progress-wrapper {
  display:flex;
  align-items:center;
  gap:10px;
}

.progress {
  flex:1;
  height:8px;
  background:#1c1c2b;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
  transition:width 0.8s ease-in-out;
}

/* STATUS STYLE (dynamic classes) */
.status {
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:500;
}

.status.active {
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

.status.pending {
  background:rgba(245,158,11,0.15);
  color:#f59e0b;
}

.status.complete {
  background:rgba(139,92,246,0.15);
  color:#8b5cf6;
}

/* PROGRESS */
.progress {
  height:8px;
  background:#1c1c2b;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
  animation: progressAnim 2s ease-in-out;
}

/* STATUS BADGE */
.badge {
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

.badge-active {
  background:#22c55e;
}

.badge-pending {
  background:#f59e0b;
}

.badge-complete {
  background:#8b5cf6;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes slideUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

@keyframes progressAnim {
  from {width:0;}
}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{
    width:70px;
  }

  .sidebar a span{
    display:none;
  }

  .main{
    margin-left:70px;
  }

  .topbar{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  table{
    font-size:12px;
  }
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
  <a href="trainer_batches.html"class="active"><i class="fas fa-layer-group me-2"></i>My Batches</a>
  <a href="training_sessions.html"><i class="fas fa-chalkboard-teacher me-2"></i>Sessions</a>
  <a href="practical_project.html"><i class="fas fa-laptop-code me-2"></i>Practicals</a>
  <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
  <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="topbar">
  <h4>📊 My Batches</h4>

  <input type="text" id="searchInput" class="search-box" placeholder="Search batch...">
</div>

<div class="card table-responsive">

<table class="table text-light align-middle custom-table">
<thead>
<tr>
  <th>Batch</th>
  <th>Dates</th>
  <th>Total Days</th>
  <th>Completed</th>
  <th>Progress</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="batchTable">
  <!-- Dynamic rows will be injected here -->
</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("input", function () {
  let filter = this.value.toLowerCase();
  document.querySelectorAll("#batchTable tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
