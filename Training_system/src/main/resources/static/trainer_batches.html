<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Batches</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
/* ===== VARIABLES ===== */
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
  background:#111118;
  padding:15px 20px;
  border-radius:14px;
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid var(--border);
  animation: slideDown 0.6s ease;
}

/* ===== SEARCH ===== */
.search-box{
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  padding:10px 15px;
  border-radius:10px;
  color:white;
  transition:.3s;
}

.search-box:focus{
  outline:none;
  box-shadow:0 0 12px var(--glow);
  background:rgba(255,255,255,0.08);
}

/* ===== CARD ===== */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:18px;
  backdrop-filter:blur(15px);
  padding:15px;
  margin-top:20px;
  animation:fadeUp 0.6s ease;
}

/* ===== TABLE ===== */
.custom-table{
  border-collapse:separate;
  border-spacing:0 14px;
  min-width:700px;
}

/* HEADER */
.custom-table thead th{
  background:linear-gradient(90deg,#8b5cf6,#6d28d9);
  color:#fff;
  border:none;
  padding:14px;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  text-align:center;
}

/* ROW */
.custom-table tbody tr{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  transition:0.4s;
  border:1px solid var(--border);
}

/* FLOAT EFFECT */
.custom-table tbody tr:hover{
  transform:translateY(-6px) scale(1.01);
  background:rgba(139,92,246,0.15);
  box-shadow:0 10px 25px rgba(139,92,246,0.3);
}

/* CELL */
.custom-table td{
  padding:16px;
  border:none;
  text-align:center;
}

/* ROUNDED ROW */
.custom-table tbody tr td:first-child{
  border-top-left-radius:14px;
  border-bottom-left-radius:14px;
}
.custom-table tbody tr td:last-child{
  border-top-right-radius:14px;
  border-bottom-right-radius:14px;
}

/* ===== PROGRESS ===== */
.progress{
  height:8px;
  border-radius:10px;
  background:#1c1c2b;
  overflow:hidden;
}

.progress-bar{
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
  animation:progressAnim 1.5s ease;
}

/* ===== STATUS BADGE ===== */
.status{
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.status.active{
  background:rgba(34,197,94,0.2);
  color:#22c55e;
}

.status.pending{
  background:rgba(234,179,8,0.2);
  color:#eab308;
}

.status.complete{
  background:rgba(139,92,246,0.2);
  color:#8b5cf6;
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes progressAnim{
  from{width:0;}
}

/* ===== RESPONSIVE ===== */
@media(max-width:992px){
  .main{
    margin-left:70px;
  }
  .sidebar{
    width:70px;
  }
}

@media(max-width:768px){
  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    display:flex;
    overflow-x:auto;
  }

  .sidebar a{
    flex:1;
    justify-content:center;
    font-size:12px;
  }

  .main{
    margin-left:0;
    padding:15px;
  }

  .topbar{
    flex-direction:column;
    gap:10px;
    align-items:flex-start;
  }

  .custom-table{
    min-width:100%;
  }

  .custom-table thead{
    display:none;
  }

  .custom-table tbody tr{
    display:block;
    margin-bottom:15px;
    padding:10px;
  }

  .custom-table td{
    display:flex;
    justify-content:space-between;
    font-size:12px;
  }

  .custom-table td::before{
    content:attr(data-label);
    font-weight:bold;
    color:var(--purple2);
  }
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
  <a href="trainer_batches.html"class="active"><i class="fas fa-layer-group me-2"></i>My Batches</a>
  <a href="training_sessions.html"><i class="fas fa-chalkboard-teacher me-2"></i>Sessions</a>
  <a href="practical_project.html"><i class="fas fa-laptop-code me-2"></i>Practicals</a>
  <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
  <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="topbar">
  <h4>📊 My Batches</h4>

  <input type="text" id="searchInput" class="search-box" placeholder="Search batch...">
</div>

<div class="card table-responsive">

<table class="table text-light align-middle custom-table">
<thead>
<tr>
  <th>Batch</th>
  <th>Dates</th>
  <th>Total Days</th>
  <th>Completed</th>
  <th>Progress</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="batchTable">
  <!-- Dynamic rows will be injected here -->
</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>
function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("input", function () {
  let filter = this.value.toLowerCase();
  document.querySelectorAll("#batchTable tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});
</script>

</body>
</html>
