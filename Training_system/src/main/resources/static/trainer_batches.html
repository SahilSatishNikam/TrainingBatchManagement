<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Batches</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --primary: linear-gradient(135deg, #6777ef, #9c88ff);
    --bg: #f4f6f9;
}

body {
    margin: 0;
    display: flex;
    background: var(--bg);
    font-family: 'Poppins', sans-serif;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: var(--primary);
    color: white;
}

.sidebar .brand {
    font-size: 22px;
    padding: 20px;
    font-weight: bold;
    text-align: center;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: #eee;
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a i {
    width: 25px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.15);
    padding-left: 25px;
}

.sidebar a.active {
    background: rgba(255,255,255,0.25);
    border-left: 4px solid #fff;
}

/* ===== MAIN ===== */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 20px;
}

/* ===== TOPBAR ===== */
.topbar {
    background: white;
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* ===== TABLE CARD ===== */
.card {
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.table thead {
    background: #6777ef;
    color: white;
}

.progress {
    height: 8px;
}
</style>

<script>
// 🔒 Protect Page
(function () {
    const role = localStorage.getItem("role");
    if (!role || role !== "TRAINER") {
        alert("Access denied");
        window.location.href = "login.html";
    }
})();
</script>

</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">
    <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html">
        <i class="fas fa-home me-2"></i>Dashboard
    </a>

    <a href="create_batch.html">
        <i class="fas fa-plus me-2"></i>Create Batch
    </a>

    <a href="trainer_batches.html"  class="active">
        <i class="fas fa-layer-group me-2"></i>My Batches
    </a>

    <a href="training_sessions.html">
        <i class="fas fa-layer-group me-2"></i>Create Session
    </a>

    <a href="practical_project.html">
        <i class="fas fa-laptop-code me-2"></i>Practicals & Projects
    </a>

    <a href="mock_interview.html">
        <i class="fas fa-microphone me-2"></i>Mock Interviews
    </a>

    <a href="update_progress.html">
        <i class="fas fa-chart-line me-2"></i>Progress
    </a>

    <a href="trainer_notification.html">
        <i class="fas fa-bell me-2"></i>Notifications
    </a>


    <a href="#" onclick="logout()">
        <i class="fas fa-sign-out-alt me-2"></i>Logout
    </a>
</div>

<!-- ===== MAIN ===== -->
<div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
        <h5>📊 My Batches</h5>
        <button class="btn btn-sm btn-primary" onclick="logout()">Logout</button>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <h5 class="mb-3">Assigned Batches</h5>

        <table class="table table-hover text-center">
            <thead>
                <tr>
                    <th>Batch</th>
                    <th>Dates</th>
                    <th>Total Days</th>
                    <th>Completed</th>
                    <th>Progress</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="batchTable"></tbody>
        </table>
    </div>

</div>

<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>

<script src="script.js"></script>

</body>
</html>
