<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
/* ===== VARIABLES ===== */
:root {
    --bg: #0b0b0f;
    --card: #111118;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --muted: #9aa0a6;
    --purple: #a855f7;
    --purple-dark: #6d28d9;
}
.section-title {
    color: #ffffff;
    font-weight: 600;
}

/* BODY */
body {
    margin: 0;
    display: flex;
    background: radial-gradient(circle at top, #111122, #050508);
    color: white;
    font-family: 'times new roman', sans-serif;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    height: 100vh;
    position: fixed;
    background: #0d0d14;
    border-right: 1px solid var(--border);
}

.sidebar .brand {
    font-size: 20px;
    padding: 20px;
    font-weight: bold;
    color: var(--purple);
    letter-spacing: 1px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #a855f7; }
    to { text-shadow: 0 0 20px #a855f7; }
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    color: var(--muted);
    text-decoration: none;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(168,85,247,0.1);
    color: white;
    transform: translateX(5px);
}

.sidebar a.active {
    background: rgba(168,85,247,0.15);
    border-left: 3px solid var(--purple);
    color: white;
}

/* MAIN */
.main {
    margin-left: 240px;
    width: 100%;
    padding: 25px;
}

/* TOPBAR */
.topbar {
  background:#111118;
  padding:15px 20px;
  border-radius:14px;
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border:1px solid var(--border);
  animation: slideDown 0.6s ease;
}

.topbar:hover {
  box-shadow:0 0 20px var(--glow);
}

#notificationWrapper {
  position: relative;
}

#notificationList {
  position: absolute;
  top: 40px;
  right: 0;
  width: 300px;
  max-height: 400px;
  overflow-y: auto;

  background: #111;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 10px;

  display: none;
  z-index: 999;
}

.notification-item {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: fadeIn 0.3s ease;
}

.notification-item:hover {
  background: rgba(139,92,246,0.15);
}

.notification-item .time {
  font-size: 11px;
  color: #aaa;
}

/* ================= CARDS ================= */
.card-box {
  padding:25px;
  border-radius:16px;
  text-align:center;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter: blur(10px);
  transition:0.4s;
  animation: fadeUp 0.8s ease;
}

.card-box:hover {
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 0 25px var(--glow);
}

.card-box::after {
  content:"";
  display:block;
  height:3px;
  margin-top:10px;
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
}

.card-box h4 {
  font-size:28px;
  font-weight:bold;
}

.card-box:hover h4 {
  color:var(--purple2);
  text-shadow:0 0 10px var(--glow);
}

.card-box p {
  color:var(--muted);
}

/* ================= TABLE CARD ================= */
.table-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  animation: fadeUp 1s ease;
}

/* TITLE */
.table-title {
  font-weight:bold;
  letter-spacing:1px;
  border-left:4px solid var(--purple);
  padding-left:10px;
  margin-bottom:20px;
}

/* ================= TABLE ================= */
.custom-table {
  border-collapse:separate;
  border-spacing:0 12px;
  color:var(--text);
}

/* HEADER */
.custom-table thead th {
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  color:#fff;
  border:none;
  padding:14px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* ROW */
.custom-table tbody tr {
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  backdrop-filter:blur(12px);
  transition:all 0.3s ease;
}

/* ROUND EDGES */
.custom-table tbody tr td:first-child {
  border-top-left-radius:12px;
  border-bottom-left-radius:12px;
}
.custom-table tbody tr td:last-child {
  border-top-right-radius:12px;
  border-bottom-right-radius:12px;
}

/* CELLS */
.custom-table td {
  padding:14px;
  border:none;
}

/* HOVER */
.custom-table tbody tr:hover {
  transform:translateY(-5px) scale(1.01);
  background:rgba(139,92,246,0.15);
  box-shadow:0 10px 25px rgba(139,92,246,0.25);
}

/* ================= PROGRESS ================= */
.progress {
  height:10px;
  border-radius:20px;
  overflow:hidden;
  background:#1c1c2b;
}

.progress-bar {
  font-size:10px;
  font-weight:bold;
  background:linear-gradient(90deg,#8b5cf6,#c4b5fd);
  box-shadow:0 0 10px var(--glow);
  animation: loadBar 1.5s ease;
}

/* ================= NOTIFICATION ================= */
.fa-bell {
  transition:0.3s;
}

.fa-bell:hover {
  transform:rotate(15deg) scale(1.2);
  color:var(--purple2);
}

#notifCount {
  position:absolute;
  top:-6px;
  right:-6px;
  background:red;
  color:white;
  font-size:11px;
  padding:4px 6px;
  border-radius:50%;
}

/* ================= ANIMATIONS ================= */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes fadeUp {
  from {
    transform:translateY(30px);
    opacity:0;
  }
  to {
    transform:translateY(0);
    opacity:1;
  }
}

@keyframes slideDown {
  from {
    transform:translateY(-30px);
    opacity:0;
  }
  to {
    transform:translateY(0);
    opacity:1;
  }
}

@keyframes loadBar {
  from { width:0; }
}

/* ================= RESPONSIVE ================= */
@media (max-width:900px) {
  .sidebar { width:70px; }
  .main { margin-left:70px; }
  .sidebar .brand { font-size:14px; }
}

@media (max-width:600px) {

  body { flex-direction:column; }

  .sidebar {
    width:100%;
    height:auto;
    display:flex;
    overflow-x:auto;
  }

  .sidebar a {
    flex:1;
    justify-content:center;
    font-size:12px;
  }

  .main {
    margin-left:0;
    padding:15px;
  }

  /* MOBILE TABLE */
  .custom-table thead {
    display:none;
  }

  .custom-table tbody tr {
    display:block;
    margin-bottom:15px;
    padding:10px;
  }

  .custom-table td {
    display:flex;
    justify-content:space-between;
    font-size:12px;
  }

  .custom-table td::before {
    content:attr(data-label);
    font-weight:bold;
    color:var(--purple2);
  }
}
</style>

<script>
(function() {
    let role = localStorage.getItem("role");
    if (role) role = role.replace("ROLE_", "").toUpperCase();

    if (!role || role !== "TRAINER") {
        alert("Access denied");
        window.location.href = "login.html";
    }
})();
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html" class="active"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
  <a href="trainer_batches.html"><i class="fas fa-layer-group me-2"></i>My Batches</a>
  <a href="training_sessions.html"><i class="fas fa-chalkboard-teacher me-2"></i>Sessions</a>
  <a href="practical_project.html"><i class="fas fa-laptop-code me-2"></i>Practicals</a>
  <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
  <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h5>Trainer Dashboard</h5>

    <!-- TOPBAR RIGHT -->
<div id="notificationWrapper" style="position:relative; cursor:pointer;">

  <div onclick="toggleNotifications()">
    <i class="fas fa-bell"></i>
    <span id="notifCount">0</span>
  </div>

  <!-- DROPDOWN -->
  <div id="notificationList">
    <div id="emptyMsg" style="text-align:center; color:#aaa;">No notifications</div>
  </div>

</div>
  </div>

  <!-- CARDS -->
  <div class="row mt-4">
    <div class="col-md-3">
      <div class="card-box">
        <h4 id="totalBatches">0</h4>
        <p>Assigned</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="activeBatches">0</h4>
        <p>Active</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="completedBatches">0</h4>
        <p>Completed</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="pending">0</h4>
        <p>Pending</p>
      </div>
    </div>
  </div>

  <div class="table-card mt-4">

  <h4 class="table-title">📚 My Assigned Batches</h4>

  <div class="table-responsive">
    <table class="table custom-table text-center align-middle">

      <thead>
        <tr>
          <th>📦 Batch</th>
          <th>📅 Start</th>
          <th>📅 End</th>
          <th>📊 Progress</th>
        </tr>
      </thead>

      <tbody id="trainerBatchTable"></tbody>

    </table>
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>

    initNotifications();
    connectSocket();

</script>

</body>
</html>
