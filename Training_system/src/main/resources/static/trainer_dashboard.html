<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainer Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
/* ================= THEME ================= */
:root {
  --bg: #0b0b14;
  --card: rgba(255, 255, 255, 0.04);
  --border: rgba(255, 255, 255, 0.08);
  --text: #f5f5ff;
  --muted: #b8b8d1;
  --purple: #8b5cf6;
  --purple2: #a78bfa;
  --glow: rgba(139, 92, 246, 0.45);
}

body {
  margin: 0;
  display: flex;
  background: radial-gradient(circle at top right, #1a1a2e, #0b0b14);
  color: var(--text);
  font-family: "Segoe UI", sans-serif;
}

/* ================= SIDEBAR ================= */
.sidebar {
  width: 240px;
  height: 100vh;
  position: fixed;
  background: linear-gradient(180deg, #111326, #0b0b14);
  border-right: 1px solid var(--border);
}

.sidebar .brand {
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: linear-gradient(45deg, #8b5cf6, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sidebar a {
  display: flex;
  align-items: center;
  padding: 14px 20px;
  color: var(--muted);
  text-decoration: none;
  transition: 0.3s;
}

.sidebar a:hover,
.sidebar a.active {
  background: rgba(139, 92, 246, 0.15);
  color: #fff;
  border-left: 4px solid var(--purple);
  box-shadow: 0 0 12px var(--glow);
}

/* ================= MAIN ================= */
.main {
  margin-left: 240px;
  width: 100%;
  padding: 25px;
}

/* ================= TOPBAR ================= */
.topbar {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 15px 20px;
  border-radius: 14px;
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* ================= CARDS ================= */
.card-box {
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card-box:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 25px var(--glow);
}

.card-box::after {
  content: "";
  display: block;
  height: 3px;
  margin-top: 10px;
  background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
}

.card-box h4 {
  font-size: 28px;
  font-weight: bold;
}

.card-box p {
  color: var(--muted);
}

/* ================= TABLE ================= */
.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
}

.table {
  color: var(--text);
}

.table thead {
  color: var(--purple2);
}

.table tbody tr:hover {
  background: rgba(139, 92, 246, 0.1);
}

/* ================= PROGRESS ================= */
.progress {
  background: #1c1c2b;
  height: 10px;
}

.progress-bar {
  background: linear-gradient(90deg, #8b5cf6, #c4b5fd);
}

/* ================= NOTIFICATION ================= */
#notifCount {
  position: absolute;
  top: -6px;
  right: -6px;
  background: red;
  color: white;
  font-size: 11px;
  padding: 4px 6px;
  border-radius: 50%;
}
</style>

<script>
(function() {
    let role = localStorage.getItem("role");
    if (role) role = role.replace("ROLE_", "").toUpperCase();

    if (!role || role !== "TRAINER") {
        alert("Access denied");
        window.location.href = "login.html";
    }
})();
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">🎓 Smart Trainer</div>

  <a href="trainer_dashboard.html" class="active"><i class="fas fa-home me-2"></i>Dashboard</a>
  <a href="create_batch.html"><i class="fas fa-plus me-2"></i>Create Batch</a>
  <a href="trainer_batches.html"><i class="fas fa-layer-group me-2"></i>My Batches</a>
  <a href="training_sessions.html"><i class="fas fa-chalkboard-teacher me-2"></i>Sessions</a>
  <a href="practical_project.html"><i class="fas fa-laptop-code me-2"></i>Practicals</a>
  <a href="mock_interview.html"><i class="fas fa-microphone me-2"></i>Mock Interviews</a>
  <a href="update_progress.html"><i class="fas fa-chart-line me-2"></i>Progress</a>
  <a href="trainer_notification.html"><i class="fas fa-bell me-2"></i>Notifications</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h5>Trainer Dashboard</h5>

    <div onclick="toggleNotifications()" style="position:relative; cursor:pointer;">
      <i class="fas fa-bell"></i>
      <span id="notifCount">0</span>
    </div>
  </div>

  <!-- CARDS -->
  <div class="row mt-4">
    <div class="col-md-3">
      <div class="card-box">
        <h4 id="totalBatches">0</h4>
        <p>Assigned</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="activeBatches">0</h4>
        <p>Active</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="completedBatches">0</h4>
        <p>Completed</p>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card-box">
        <h4 id="pending">0</h4>
        <p>Pending</p>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card mt-4">
    <h5>My Assigned Batches</h5>

    <table class="table text-center mt-3">
      <thead>
        <tr>
          <th>Batch</th>
          <th>Start</th>
          <th>End</th>
          <th>Progress</th>
        </tr>
      </thead>
      <tbody id="trainerBatchTable"></tbody>
    </table>
  </div>

</div>

<!-- NOTIFICATIONS -->
<div id="notificationList"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script src="script.js"></script>

</body>
</html>
